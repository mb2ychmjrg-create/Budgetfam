<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>BudgetFam 🇮🇱</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0D0F14;--card:#161A23;--border:#232840;
  --accent:#4F8EF7;--accent-soft:#1E2D50;
  --green:#2ECC8A;--green-soft:#0E3028;
  --red:#F7506A;--red-soft:#3A1020;
  --yellow:#F7C948;--yellow-soft:#3A2E0A;
  --purple:#A78BFA;--purple-soft:#1E1640;
  --orange:#FB923C;--orange-soft:#2A1500;
  --text:#E8EAF2;--muted:#6B7280;--divider:#1E2230;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.syne{font-family:'Syne',sans-serif;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{width:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes syncPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.8}}
.fu{animation:fadeUp .4s ease both;}
.fu1{animation-delay:.04s}.fu2{animation-delay:.1s}.fu3{animation-delay:.17s}.fu4{animation-delay:.24s}.fu5{animation-delay:.31s}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;}

/* AUTH */
.auth-screen{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:30px 24px;}
.auth-logo{font-size:48px;margin-bottom:8px;}
.auth-title{font-size:28px;font-weight:800;margin-bottom:4px;font-family:‘Syne’,sans-serif;}
.auth-sub{font-size:13px;color:var(–muted);margin-bottom:36px;text-align:center;line-height:1.5;}
.auth-tabs{display:flex;background:var(–card);border-radius:14px;padding:4px;margin-bottom:24px;width:100%;}
.auth-tab{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:13px;background:transparent;color:var(–muted);transition:all .2s;font-family:‘DM Sans’,sans-serif;}
.auth-tab.active{background:var(–accent);color:#fff;}
.field-label{font-size:12px;color:var(–muted);margin-bottom:6px;display:block;width:100%;}
.field{width:100%;padding:13px 14px;border-radius:12px;background:var(–card);border:1px solid var(–border);color:var(–text);font-size:14px;outline:none;font-family:‘DM Sans’,sans-serif;margin-bottom:14px;}
.field:focus{border-color:var(–accent);}
.btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:var(–accent);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:‘Syne’,sans-serif;transition:all .3s;margin-top:4px;}
.btn-primary.loading{opacity:.6;pointer-events:none;}
.auth-error{background:var(–red-soft);color:var(–red);border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;width:100%;text-align:center;}
.auth-success{background:var(–green-soft);color:var(–green);border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;width:100%;text-align:center;}

/* LAYOUT */
.header{padding:14px 18px 12px;border-bottom:1px solid var(–divider);display:flex;justify-content:space-between;align-items:center;background:var(–bg);flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top));}
.header-title{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.header-sub{font-size:11px;color:var(–muted);margin-top:1px;}
.sync-badge{display:flex;align-items:center;gap:5px;background:var(–green-soft);border:1px solid var(–green);border-radius:20px;padding:4px 10px;font-size:10px;color:var(–green);font-weight:600;cursor:pointer;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(–green);animation:syncPulse 2s infinite;}
.content{flex:1;overflow-y:auto;padding:14px 14px 84px;-webkit-overflow-scrolling:touch;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(–card);border-top:1px solid var(–border);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:12px;transition:color .2s;color:var(–muted);}
.nav-item.active{color:var(–accent);}
.nav-item span:first-child{font-size:18px;}
.nav-item span:last-child{font-size:9px;font-weight:600;}

/* CARDS */
.card{background:var(–card);border:1px solid var(–border);border-radius:18px;padding:16px 18px;margin-bottom:12px;}
.hero{background:linear-gradient(135deg,#1A2540,#0D1428);border:1px solid var(–accent-soft);border-radius:18px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.hero::before{content:’’;position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:var(–accent);border-radius:50%;opacity:.07;}
.bar-wrap{background:var(–divider);border-radius:99px;overflow:hidden;}
.bar{border-radius:99px;animation:barGrow .8s cubic-bezier(.4,0,.2,1) both;transition:width .6s;}
.tx{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(–divider);}
.tx-icon{width:34px;height:34px;border-radius:10px;background:var(–divider);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.select-field{width:100%;padding:12px 14px;border-radius:12px;background:var(–divider);border:1px solid var(–border);color:var(–text);font-size:14px;outline:none;font-family:‘DM Sans’,sans-serif;-webkit-appearance:none;margin-bottom:14px;}
.submit-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(–accent);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:‘Syne’,sans-serif;transition:background .3s;}
.view{display:none;}.view.active{display:block;}
.sec-title{font-size:14px;font-weight:700;margin-bottom:12px;}
.stat-mini{flex:1;background:var(–divider);border-radius:10px;padding:9px 7px;text-align:center;}
.stat-mini label{font-size:10px;color:var(–muted);display:block;margin-bottom:2px;}
.stat-mini b{font-size:13px;font-weight:700;}
.spinner{display:block;width:18px;height:18px;border:2px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto;}
.empty{text-align:center;padding:30px 20px;color:var(–muted);font-size:13px;}
.empty span{font-size:32px;display:block;margin-bottom:10px;}

/* QUICK ADD */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.quick-btn{padding:10px 4px;border-radius:14px;border:1px solid var(–border);background:var(–card);color:var(–text);font-size:10px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.quick-btn:active{transform:scale(.93);background:var(–divider);}
.quick-btn .q-emoji{font-size:20px;display:block;margin-bottom:3px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.modal-sheet{background:var(–bg);border:1px solid var(–border);border-radius:26px 26px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;padding:20px 20px max(40px,env(safe-area-inset-bottom));position:relative;}
.modal-handle{width:40px;height:4px;background:var(–border);border-radius:99px;margin:0 auto 20px;}
.modal-close{position:absolute;top:20px;right:18px;background:var(–divider);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(–muted);font-size:16px;display:flex;align-items:center;justify-content:center;}

/* BANK CONNECTION */
.bank-btn{width:100%;display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(–card);border:1px solid var(–border);border-radius:16px;margin-bottom:10px;cursor:pointer;text-align:left;transition:all .2s;font-family:‘DM Sans’,sans-serif;}
.bank-btn:active{border-color:var(–accent);background:var(–accent-soft);}
.bank-btn.connected{border-color:var(–green);background:var(–green-soft);}
.bank-logo{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;font-weight:800;font-family:‘Syne’,sans-serif;}
.bank-info{flex:1;}
.bank-info .name{font-size:14px;font-weight:700;color:var(–text);}
.bank-info .sub{font-size:11px;color:var(–muted);margin-top:2px;}
.bank-status{font-size:11px;font-weight:600;}

/* CAT BADGE */
.cat-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}

/* CHART */
.chart-tabs{display:flex;gap:6px;margin-bottom:14px;}
.chart-tab{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(–border);background:transparent;color:var(–muted);font-size:11px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif;transition:all .2s;text-align:center;}
.chart-tab.active{background:var(–accent-soft);border-color:var(–accent);color:var(–accent);}
.chart-panel{display:none;}.chart-panel.active{display:block;}
.legend-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(–divider);font-size:12px;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* AI DOTS */
.ai-dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(–accent);margin:0 2px;animation:pulse 1.2s infinite;}
.ai-dots span:nth-child(2){animation-delay:.2s;}.ai-dots span:nth-child(3){animation-delay:.4s;}

/* STEP */
.steps{display:flex;gap:5px;justify-content:center;margin-bottom:18px;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(–divider);transition:all .3s;}
.step-dot.done{background:var(–green);}
.step-dot.active{background:var(–accent);width:22px;border-radius:4px;}

/* PROJECT TYPE */
.proj-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.proj-type-btn{padding:12px 6px;border-radius:14px;border:1px solid var(–border);background:var(–divider);color:var(–muted);font-size:11px;font-weight:600;cursor:pointer;font-family:‘DM Sans’,sans-serif;text-align:center;transition:all .2s;}
.proj-type-btn.active{background:var(–accent-soft);border-color:var(–accent);color:var(–accent);}
.proj-type-btn .pt-emoji{font-size:22px;display:block;margin-bottom:4px;}

/* AI RESULT */
.ai-result{background:linear-gradient(135deg,#1E2D50,#1E1640);border:1px solid var(–accent);border-radius:16px;padding:16px;margin:10px 0;line-height:1.8;font-size:13px;}
</style>

</head>

function localCategorize(label, amount) {
  if (!label) return amount > 0 ? 'Salaire' : 'Divers';
  for (const [re, cat] of MERCHANT_RULES) {
    if (re.test(label)) return cat;
  }
  return amount > 0 ? 'Salaire' : 'Divers';
}

// ─── CLAUDE API CATEGORIZATION (fallback) ────────────────────
async function claudeCategorize(label, amount) {
  try {
    const cats = ['Alimentation','Logement','Transport','Loisirs','Santé','Épargne','Abonnements','Éducation','Salaire','Divers'];
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 20,
        messages: [{ role: 'user', content: `Catégorie pour cette transaction d'une famille israélienne.
Marchand/Description: "${label}", Montant: ${amount} ₪.
Catégories: ${cats.join(', ')}.
Réponds UNIQUEMENT le nom de la catégorie.` }]
      })
    });
    const d = await r.json();
    const cat = d.content?.[0]?.text?.trim();
    return cats.includes(cat) ? cat : (amount > 0 ? 'Salaire' : 'Divers');
  } catch { return amount > 0 ? 'Salaire' : 'Divers'; }
}

async function smartCategorize(label, amount) {
  const local = localCategorize(label, amount);
  if (local !== 'Divers' && local !== 'Salaire') return local;
  // Only call Claude for unknown merchants
  return await claudeCategorize(label, amount);
}

let authMode = 'login';
function switchTab(m) {
  authMode = m;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active',(i===0&&m==='login')||(i===1&&m==='signup')));
  document.getElementById('signup-extra').style.display = m==='signup'?'block':'none';
  document.getElementById('auth-btn').textContent = m==='login'?'Se connecter':'Créer mon compte';
  document.getElementById('auth-msg').innerHTML='';
}
function showMsg(msg, type='error') { document.getElementById('auth-msg').innerHTML=`<div class="auth-${type}">${msg}</div>`; }
async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-btn');
  if (!email||!password) return showMsg('Remplis tous les champs.');
  btn.classList.add('loading'); btn.textContent='...';
  if (authMode==='signup') {
    const name = document.getElementById('auth-name').value.trim()||'Utilisateur';
    const { error } = await sb.auth.signUp({ email, password, options:{data:{full_name:name}} });
    if (error) { showMsg(error.message); btn.classList.remove('loading'); btn.textContent='Créer mon compte'; return; }
    showMsg('✅ Compte créé ! Vérifie ton email.','success'); btn.classList.remove('loading'); btn.textContent='Créer mon compte';
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showMsg('Email ou mot de passe incorrect.'); btn.classList.remove('loading'); btn.textContent='Se connecter'; return; }
    currentUser = data.user; enterApp();
  }
}

  if (!confirm('Se déconnecter ?')) return;

// ─── CSV IMPORT WITH AUTO-CATEGORIZATION ─────────────────────
async function handleCSVImport(input, isModal=false) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById(isModal?'csv-modal-status':'csv-status');
  statusEl.innerHTML = '<div class="spinner"></div>';

  const reader = new FileReader();
  reader.onload = async e => {
    const text = e.target.result;
    const sep = text.includes(';') ? ';' : ',';
    const lines = text.split('\n').filter(l=>l.trim());
    const toInsert = [];
    let aiProcessed = 0;

    statusEl.innerHTML = `<div style="font-size:12px;color:var(--accent)">🤖 Analyse par IA de ${lines.length-1} transactions...</div>`;

    for (let i=1; i<lines.length; i++) {
      const cols = lines[i].split(sep).map(c=>c.trim().replace(/"/g,''));
      if (cols.length < 2) continue;
      const dateStr = cols[0];
      const desc = cols[1]||cols[2]||'Transaction';
      const amtRaw = (cols[cols.length-1]||cols[2]||'0').replace(/,/,'.').replace(/[^\d\-\.]/g,'');
      const amount = parseFloat(amtRaw);
      if (isNaN(amount)||amount===0) continue;

      // Try local rules first
      let category = localCategorize(desc, amount);
      if (category==='Divers'||category==='Salaire') {
        // Call Claude for unknown merchants (batch every 5 to save API calls)
        if (aiProcessed < 30) { // limit AI calls per import
          category = await claudeCategorize(desc, amount);
          aiProcessed++;
        }
      }

      toInsert.push({
        user_id: currentUser.id,
        label: desc.substring(0,100),
        amount,
        category,
        created_at: new Date(dateStr||Date.now()).toISOString(),
      });
    }

    if (!toInsert.length) { statusEl.innerHTML='<div style="color:var(--red);font-size:12px">Aucune transaction valide trouvée.</div>'; return; }

    const { error } = await sb.from('transactions').insert(toInsert);
    if (error) { statusEl.innerHTML=`<div style="color:var(--red);font-size:12px">Erreur: ${error.message}</div>`; return; }

    statusEl.innerHTML=`<div style="text-align:center;padding:14px;color:var(--green)"><div style="font-size:24px;margin-bottom:6px">✅</div><div style="font-weight:700">${toInsert.length} transactions importées</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${aiProcessed} catégorisées par IA</div></div>`;
    await loadDashboard(); await loadTransactions();
    if (isModal) setTimeout(()=>{ document.getElementById('bank-modal').style.display='none'; },2000);
  };
  reader.readAsText(file,'UTF-8');
}

        <div class="stat-mini"><label>Épargne</label><b style="color:${savings>=0?'var(--accent)':'var(--red)'}">${savings.toLocaleString('fr-FR')} ₪</b></div>
      </div>
    </div>
    <div class="card fu fu2">
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="switchChart('donut',this)">🍩 Catégories</button>
        <button class="chart-tab" onclick="switchChart('bar',this)">📊 Mensuel</button>
        <button class="chart-tab" onclick="switchChart('line',this)">📈 Solde</button>
      </div>
      <div id="panel-donut" class="chart-panel active"><div style="position:relative;height:200px;display:flex;align-items:center;justify-content:center;"><canvas id="chart-donut"></canvas></div><div id="donut-legend" style="margin-top:12px"></div></div>
      <div id="panel-bar" class="chart-panel"><div style="position:relative;height:220px;"><canvas id="chart-bar"></canvas></div></div>
      <div id="panel-line" class="chart-panel"><div style="position:relative;height:220px;"><canvas id="chart-line"></canvas></div></div>
    </div>
    <div class="card fu fu3"><div class="syne sec-title">Transactions</div><div style="font-size:36px;font-weight:800;color:var(--accent);font-family:'Syne',sans-serif;text-align:center;padding:6px 0">${all.length}</div><div style="text-align:center;font-size:12px;color:var(--muted)">transactions analysées par IA</div></div>`;
  requestAnimationFrame(()=>{ buildDonut(catLabels,catValues); buildBar(mLabels,iData,eData); buildLine(bLabels,bData); });
}
function baseOpts(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};}
function buildDonut(labels,values){
  if(chartDonut){chartDonut.destroy();chartDonut=null;}if(!labels.length)return;
  const ctx=document.getElementById('chart-donut').getContext('2d');
  chartDonut=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:PALETTE,borderColor:'#161A23',borderWidth:3,hoverOffset:6}]},options:{...baseOpts(),cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed.toLocaleString('fr-FR')} ₪`}}}}});
  const total=values.reduce((a,b)=>a+b,0);
  document.getElementById('donut-legend').innerHTML=labels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></div><div style="flex:1;font-size:12px">${getCatIcon(l)} ${l}</div><div style="font-size:12px;color:var(--muted)">${values[i].toLocaleString('fr-FR')} ₪</div><div style="font-size:11px;color:var(--accent);width:32px;text-align:right">${Math.round(values[i]/total*100)}%</div></div>`).join('');
}
function buildBar(labels,iData,eData){
  if(chartBar){chartBar.destroy();chartBar=null;}if(!labels.length)return;
  const ctx=document.getElementById('chart-bar').getContext('2d');
  chartBar=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Revenus',data:iData,backgroundColor:'#2ECC8A55',borderColor:'#2ECC8A',borderWidth:2,borderRadius:6},{label:'Dépenses',data:eData,backgroundColor:'#F7506A55',borderColor:'#F7506A',borderWidth:2,borderRadius:6}]},options:{...baseOpts(),plugins:{legend:{display:true,labels:{color:'#6B7280',font:{size:11},boxWidth:12,padding:16}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toLocaleString('fr-FR')} ₪`}}},scales:{x:{ticks:{color:'#6B7280',font:{size:10}},grid:{color:'#1E2230'}},y:{ticks:{color:'#6B7280',font:{size:10},callback:v=>v.toLocaleString('fr-FR')},grid:{color:'#1E2230'}}}}});
}
function buildLine(labels,data){
  if(chartLine){chartLine.destroy();chartLine=null;}if(!labels.length)return;
  const ctx=document.getElementById('chart-line').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,200);g.addColorStop(0,'#4F8EF744');g.addColorStop(1,'#4F8EF700');
  chartLine=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Solde',data,borderColor:'#4F8EF7',borderWidth:2,backgroundColor:g,fill:true,tension:0.4,pointRadius:data.length<=20?3:0,pointBackgroundColor:'#4F8EF7'}]},options:{...baseOpts(),plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` Solde: ${c.parsed.y.toLocaleString('fr-FR')} ₪`}}},scales:{x:{ticks:{color:'#6B7280',font:{size:10},maxTicksLimit:6},grid:{color:'#1E2230'}},y:{ticks:{color:'#6B7280',font:{size:10},callback:v=>v.toLocaleString('fr-FR')},grid:{color:'#1E2230'}}}}});
}
function switchChart(name,btn){
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.chart-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');document.getElementById('panel-'+name).classList.add('active');
}

// ─── FAMILY ───────────────────────────────────────────────────
async function loadFamilyData(){
  const{data}=await sb.from('family_members').select('*,families(*)').eq('user_id',currentUser.id).maybeSingle();
  if(data?.families){currentFamily=data.families;const{data:m}=await sb.from('family_members').select('*').eq('family_id',currentFamily.id);familyMembers=m||[];}
}

// ─── HELPERS ─────────────────────────────────────────────────
function getCatIcon(cat){const m={Alimentation:'🛒',Logement:'🏠',Transport:'🚗',Loisirs:'🎮',Santé:'💊',Épargne:'💰',Divers:'📦',Salaire:'💼',Freelance:'💻',Allocations:'🏛️',Cadeau:'🎁',Investissement:'📈',Abonnements:'📱',Éducation:'🎓'};return m[cat]||'💸';}
function formatDate(d){if(!d)return'';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function setType(t){txType=t;const s=document.getElementById('f-cat');if(!s)return;const e=['Alimentation','Logement','Transport','Loisirs','Santé','Épargne','Abonnements','Éducation','Divers'];const i=['Salaire','Freelance','Allocations','Loyer reçu','Cadeau','Investissement','Autre'];s.innerHTML=(t==='income'?i:e).map(c=>`<option>${c}</option>`).join('');const lw=document.getElementById('f-label-wrap');if(lw)lw.style.display=t==='income'?'none':'block';if(t==='income')document.getElementById('f-label').value='';}

// ─── VIEW SWITCHING ───────────────────────────────────────────
function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  document.querySelector('.content').scrollTop=0;
  if(name==='stats')loadStats();
  if(name==='projects')loadProjects();
  if(name==='bank')loadBankView();
  if(name==='add')loadAiTip();
  if(name==='dashboard'){loadDashboard();loadTransactions();}
}

// ─── INIT ─────────────────────────────────────────────────────
sb.auth.onAuthStateChange((event,session)=>{
  if(session?.user){currentUser=session.user;enterApp();}
});
</script>
