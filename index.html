<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceAI Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b14; --card: #161625; --accent: #7c3aed; --text: #ffffff;
            --text-muted: #94a3b8; --red: #ef4444; --green: #22c55e; --border: #2d2d44;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }

        .app-header { padding: 20px; background: linear-gradient(135deg, #4c1d95, #7c3aed); display: flex; justify-content: space-between; align-items: center; }
        .deco-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 12px; font-size: 12px; }

        .dashboard-card { margin: 20px; padding: 25px; background: var(--card); border-radius: 28px; border: 1px solid var(--border); }
        .solde-main { font-size: 32px; font-weight: 800; margin: 10px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; }
        .stat-box span { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 5px; }

        .quick-actions { display: flex; justify-content: space-around; padding: 0 10px; margin-bottom: 20px; }
        .action-icon { background: white; padding: 15px; border-radius: 20px; text-align: center; width: 80px; color: #1e3a8a; }
        .action-icon span { display: block; font-size: 11px; font-weight: bold; margin-top: 5px; }

        .tx-list { padding: 0 20px; }
        .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .tx-details div { font-size: 14px; font-weight: 500; direction: rtl; }

        /* SECTION PROJETS REPAREE */
        .project-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .project-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .progress-container { background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; border-radius: 4px; }
        .project-stats { display: flex; justify-content: space-between; font-size: 12px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-item { background: none; border: none; color: var(--text-muted); font-size: 10px; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--accent); }

        .page { display: none; padding-bottom: 100px; }
        .page.active { display: block; }
        .input-field { width: 100%; padding: 15px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; margin: 10px 0; }
    </style>
</head>
<body>

<div id="main-app">
    <header class="app-header">
        <div><b style="font-size:18px;">FinanceAI 🇮🇱</b><br><span style="font-size:12px; opacity:0.8;">Bonjour Samuel 👋</span></div>
        <button class="deco-btn" onclick="location.reload()">Déco.</button>
    </header>

    <div id="page-accueil" class="page active">
        <div class="dashboard-card">
            <div style="font-size:11px; color:var(--text-muted);">AVRIL 2026</div>
            <div class="solde-main" id="total-solde">0 ₪</div>
            <div class="stats-grid">
                <div class="stat-box"><span>Revenus</span><div id="rev-val" style="color:var(--green)">0 ₪</div></div>
                <div class="stat-box"><span>Dépenses</span><div id="dep-val" style="color:var(--red)">0 ₪</div></div>
                <div class="stat-box"><span>Épargne</span><div id="save-val">0%</div></div>
            </div>
        </div>
        <div class="quick-actions">
            <div class="action-icon">🛒<span>Courses</span></div>
            <div class="action-icon">⛽<span>Carburant</span></div>
            <div class="action-icon">🍕<span>Restaurant</span></div>
            <div class="action-icon">💊<span>Pharmacie</span></div>
        </div>
        <div style="padding:0 20px; font-weight:bold; margin-bottom:10px;">Transactions récentes</div>
        <div id="tx-list" class="tx-list"></div>
    </div>

    <div id="page-projets" class="page">
        <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <h2>Projets 🎯</h2>
            <button class="deco-btn" style="background:var(--accent)">+ Nouveau</button>
        </div>
        <div id="projects-container" style="padding: 0 20px;">
            <div class="project-card">
                <div class="project-header">
                    <span>✈️ Vacances Tokyo</span>
                    <b>30 000 ₪</b>
                </div>
                <div class="project-stats">
                    <div class="stat-box" style="flex:1; margin-right:5px;"><span>ÉPARGNÉ</span><b style="color:var(--green)">2 200 ₪</b></div>
                    <div class="stat-box" style="flex:1; margin-right:5px;"><span>/MOIS</span><b>882 ₪</b></div>
                    <div class="stat-box" style="flex:1;"><span>AVANCEMENT</span><b>7%</b></div>
                </div>
                <div class="progress-container"><div class="progress-bar" style="width: 7%;"></div></div>
                <button class="deco-btn" style="width:100%; background:rgba(34,197,94,0.1); color:var(--green); border:1px solid var(--green)">+ Épargner</button>
            </div>
        </div>
    </div>

    <div id="page-importer" class="page">
        <div style="padding:40px; text-align:center; border:2px dashed var(--border); margin:20px; border-radius:20px;" onclick="document.getElementById('pdf-input').click()">
            <div style="font-size:50px;">📄</div>
            <p>Importer un PDF Hapoalim</p>
        </div>
        <input type="file" id="pdf-input" hidden accept="application/pdf" onchange="processPDF(this.files[0])">
    </div>

    <div id="page-ajouter" class="page">
        <div style="padding:20px;">
            <h2>Ajouter ➕</h2>
            <input type="text" id="add-desc" class="input-field" placeholder="Description (ex: Rami Levy)">
            <input type="number" id="add-amount" class="input-field" placeholder="Montant ₪">
            <button class="deco-btn" style="width:100%; padding:15px; background:var(--accent)" onclick="manualAdd()">Ajouter</button>
        </div>
    </div>

    <div id="page-stats" class="page">
        <div style="padding:20px;">
            <h2>Statistiques 📊</h2>
            <div class="dashboard-card"><canvas id="statsChart"></canvas></div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" onclick="showPage('accueil')">🏠<br>Accueil</button>
        <button class="nav-item" onclick="showPage('importer')">📄<br>Importer</button>
        <button class="nav-item" onclick="showPage('ajouter')">➕<br>Ajouter</button>
        <button class="nav-item" onclick="showPage('projets')">🎯<br>Projets</button>
        <button class="nav-item" onclick="showPage('stats')">📊<br>Stats</button>
    </nav>
</div>

<script>
const SB_URL = 'https://nyywcxcahalxazienuav.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55eXdjeGNhaGFseGF6aWVudWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjMwNzcsImV4cCI6MjA5MTYzOTA3N30._98bpQLnWA6fBiEgbWYPH8RGaWFRj8zIfMGgZe_KopM';
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function showPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

async function loadData() {
    const { data } = await supabaseClient.from('transactions').select('*').order('created_at', {ascending: false});
    if (!data) return;
    let total = 0, rev = 0, dep = 0;
    document.getElementById('tx-list').innerHTML = data.map(t => {
        total += t.amount;
        if(t.amount > 0) rev += t.amount; else dep += Math.abs(t.amount);
        return `<div class="tx-item"><div><b>${t.label}</b><br><small>${new Date(t.created_at).toLocaleDateString()}</small></div><div style="color:${t.amount<0? 'var(--red)':'var(--green)'}">${t.amount.toLocaleString()} ₪</div></div>`;
    }).join('');
    document.getElementById('total-solde').innerText = total.toLocaleString() + ' ₪';
    document.getElementById('rev-val').innerText = rev.toLocaleString() + ' ₪';
    document.getElementById('dep-val').innerText = dep.toLocaleString() + ' ₪';
    document.getElementById('save-val').innerText = rev > 0 ? Math.round(((rev - dep) / rev) * 100) + '%' : '0%';
}

async function processPDF(file) {
    const reader = new FileReader();
    reader.onload = async function() {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
        let txs = [];
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(item => item.str).join(' ');
            const regex = /(\d{2}\/\d{2}\/\d{2,4})\s+(.+?)\s+(-?[\d,]+\.\d{2})/g;
            let m;
            while ((m = regex.exec(text)) !== null) {
                let amt = parseFloat(m[3].replace(/,/g, ''));
                if (!/משכורת|זיכוי/i.test(m[2]) && amt > 0) amt = -amt;
                txs.push({ label: m[2].trim(), amount: amt, created_at: new Date().toISOString() });
            }
        }
        if (txs.length > 0) { await supabaseClient.from('transactions').insert(txs); loadData(); showPage('accueil'); }
    };
    reader.readAsArrayBuffer(file);
}

window.onload = loadData;
</script>
</body>
</html>
