<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFam STARTUP AI V2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#0A0F14,#111A2E);
color:white;
}

header{
padding:20px;
font-size:22px;
font-weight:800;
text-align:center;
}

.card{
background:#161C26;
margin:12px;
padding:15px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input,button,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:#4F8EF7;
color:white;
font-weight:700;
cursor:pointer;
}

button:hover{opacity:0.9}

.tx{
padding:8px 0;
border-bottom:1px solid #222;
}

.small{
font-size:12px;
color:#aaa;
}

#debug{
white-space:pre-wrap;
font-size:12px;
color:#7CFFB2;
margin:10px;
}
</style>
</head>

<body>

<header>🚀 BudgetFam STARTUP AI V2</header>

<div id="debug">Debug ready...</div>

<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#2ECC8A">Signup</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Ajouter transaction</h3>
<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">
<select id="cat">
<option>Alimentation</option>
<option>Transport</option>
<option>Loisirs</option>
<option>Santé</option>
<option>Logement</option>
</select>
<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>Import PDF bancaire</h3>
<input type="file" onchange="handleFile(this)">
<div class="small">PDF → analyse automatique AI</div>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
