<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bank PDF Reader V2.1 FULL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}

.container {
    max-width:900px;
    margin:auto;
}

input {
    margin:20px 0;
    padding:10px;
    background:#1e293b;
    color:white;
    border:none;
    border-radius:8px;
    width:100%;
}

.card {
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-size:12px;
    color:#cbd5e1;
}

h2 {
    color:#38bdf8;
}

.small {
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 Bank PDF Reader V2.1 (Israel FULL Parser)</h2>

<div class="small">
Compatible: Leumi • Hapoalim • Mizrahi • Discount • One Zero • Yahav
</div>

<input type="file" id="pdfUpload" accept="application/pdf"/>

<div class="card">
<h3>📊 Analyse bancaire</h3>
<div id="output">Upload un PDF bancaire pour commencer</div>
</div>

<div class="card">
<h3>🧠 Texte brut extrait (debug complet)</h3>
<pre id="text"></pre>
</div>

</div>

<script>

const fileInput = document.getElementById("pdfUpload");
const output = document.getElementById("output");
const textBox = document.getElementById("text");

fileInput.addEventListener("change", async function(e){

    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = async function(){

        const typedarray = new Uint8Array(this.result);

        const pdf = await pdfjsLib.getDocument(typedarray).promise;

        let fullText = "";

        for(let i = 1; i <= pdf.numPages; i++){

            const page = await pdf.getPage(i);
            const content = await page.getTextContent();

            const pageText = content.items
                .map(item => item.str)
                .join(" ");

            fullText += "\n" + pageText;
        }

        textBox.textContent = fullText;

        const result = analyzeBankPDF(fullText);

        output.innerHTML = `
        🏦 <b>Banque détectée:</b> ${result.bank}<br><br>
        💰 <b>Solde détecté:</b> ${result.balance}<br><br>
        💳 <b>Devise:</b> ${result.currency}<br><br>
        🎯 <b>Fiabilité:</b> ${result.confidence}<br><br>
        🔍 <b>Méthode:</b> ${result.method}
        `;
    };

    reader.readAsArrayBuffer(file);
});


// ===============================
// 🧠 ENGINE ULTRA BANK PARSER
// ===============================

function analyzeBankPDF(text){

    const t = text.toLowerCase();

    // -----------------------
    // 🏦 DETECTION BANQUE
    // -----------------------
    let bank = "Inconnue";

    if(t.includes("leumi")) bank = "Bank Leumi";
    else if(t.includes("hapoalim")) bank = "Bank Hapoalim";
    else if(t.includes("mizrahi")) bank = "Bank Mizrahi-Tefahot";
    else if(t.includes("discount")) bank = "Discount Bank";
    else if(t.includes("one zero")) bank = "One Zero";
    else if(t.includes("yahav")) bank = "Bank Yahav";


    // -----------------------
    // 💰 EXTRACTION SOLDE (MULTI STRATEGIES)
    // -----------------------

    let balance = null;
    let method = "none";

    // 1. patterns explicites multi langue
    const patterns = [
        /balance\s*[:\-]?\s*₪?\s?([\d,]+\.?\d*)/i,
        /solde\s*[:\-]?\s*₪?\s?([\d,]+\.?\d*)/i,
        /יתרה\s*[:\-]?\s*₪?\s?([\d,]+\.?\d*)/i,
        /available balance\s*[:\-]?\s*₪?\s?([\d,]+\.?\d*)/i,
        /current balance\s*[:\-]?\s*₪?\s?([\d,]+\.?\d*)/i
    ];

    for(const p of patterns){
        const m = text.match(p);
        if(m && m[1]){
            balance = m[1];
            method = "pattern_match";
            break;
        }
    }

    // 2. extraction shekel brute force
    if(!balance){
        const shekel = text.match(/₪\s?([\d,]+\.?\d{0,2})/);
        if(shekel){
            balance = shekel[1];
            method = "shekel_scan";
        }
    }

    // 3. fallback intelligent (dernier gros nombre logique)
    if(!balance){
        const numbers = text.match(/[\d]{1,3}(?:,[\d]{3})*(?:\.\d{1,2})?/g);

        if(numbers && numbers.length > 0){
            balance = numbers[numbers.length - 1];
            method = "fallback_last_number";
        }
    }

    // -----------------------
    // 🎯 CONFIANCE
    // -----------------------
    let confidence = "LOW";

    if(method === "pattern_match") confidence = "HIGH";
    if(method === "shekel_scan") confidence = "MEDIUM";
    if(method === "fallback_last_number") confidence = "LOW";


    return {
        bank,
        balance: balance || "Non détecté",
        currency: "ILS",
        confidence,
        method
    };
}

</script>

</body>
</html>
