<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BudgetFam V2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0f17;
color:#fff;
}

header{
padding:20px;
font-size:22px;
font-weight:800;
background:#111827;
}

.card{
background:#161c2a;
margin:12px;
padding:14px;
border-radius:14px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:14px;
}

button{
background:#4f8ef7;
color:white;
font-weight:700;
}

button.green{
background:#22c55e;
}

.tx{
padding:8px 0;
border-bottom:1px solid #2a2f3a;
}

.small{font-size:12px;color:#aaa}

#debug{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
color:#0f0;
font-size:11px;
padding:6px;
height:90px;
overflow:auto;
}
</style>
</head>

<body>

<header>💰 BudgetFam V2</header>

<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Login</button>
<button onclick="signup()" class="green">Signup</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Ajouter transaction</h3>
<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">
<select id="cat">
<option>Alimentation</option>
<option>Transport</option>
<option>Loisirs</option>
<option>Santé</option>
<option>Logement</option>
</select>
<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>Importer PDF</h3>
<input type="file" id="file" onchange="handleFile(this)">
<div class="small">Upload relevé bancaire PDF</div>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

<div id="debug">DEBUG: prêt</div>

<script src="script.js"></script>
</body>
</html>
