<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFam PRO 💰</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#0A0F14,#111827);
color:#fff;
}

header{
padding:20px;
font-size:22px;
font-weight:900;
text-align:center;
}

.card{
background:#161C26;
margin:12px;
padding:16px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input,button,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:14px;
}

button{
background:#4F8EF7;
color:#fff;
font-weight:700;
cursor:pointer;
}

button:hover{opacity:0.9}

#app{display:none}

.tx{
padding:10px;
border-bottom:1px solid #222;
}

.small{font-size:12px;color:#aaa}

.success{color:#2ECC8A}
.error{color:#ff5c5c}

pre{
white-space:pre-wrap;
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<header>💰 BudgetFam PRO</header>

<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#2ECC8A">Signup</button>
<div id="authMsg" class="small"></div>
</div>

<div id="app">

<div class="card">
<h3>Ajouter transaction</h3>
<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">
<select id="cat">
<option>Alimentation</option>
<option>Transport</option>
<option>Loisirs</option>
<option>Santé</option>
<option>Logement</option>
</select>
<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>Import PDF bancaire</h3>
<input type="file" id="file" onchange="handleFile(this)">
<div class="small">Upload PDF → extraction automatique</div>

<div id="pdfStatus" class="small"></div>
<pre id="pdfResult"></pre>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
