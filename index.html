<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFam PRO 💰</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0A0F14;
color:#fff;
}

header{
padding:18px;
font-size:20px;
font-weight:800;
}

.card{
background:#161C26;
margin:10px;
padding:14px;
border-radius:14px;
}

input,button,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
}

button{
background:#4F8EF7;
color:#fff;
font-weight:700;
}

.tx{
padding:8px 0;
border-bottom:1px solid #222;
}

.small{
font-size:12px;
color:#aaa;
}
</style>
</head>

<body>

<header>💰 BudgetFam PRO</header>

<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#2ECC8A">Signup</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Ajouter</h3>
<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">
<select id="cat">
<option>Alimentation</option>
<option>Transport</option>
<option>Loisirs</option>
<option>Santé</option>
<option>Logement</option>
</select>
<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>Import PDF / CSV</h3>
<input type="file" id="file" onchange="handleFile(this)">
<div class="small">PDF bancaire supporté (Claude analyse)</div>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
