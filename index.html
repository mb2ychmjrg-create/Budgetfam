<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFam PRO 💳</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:800;
}

.container{
max-width:800px;
margin:auto;
padding:10px;
}

.card{
background:#151c2c;
padding:16px;
margin-bottom:12px;
border-radius:14px;
}

input,button,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:#4f8ef7;
color:white;
font-weight:700;
}

#app{display:none}

.tx{
background:#0f172a;
padding:10px;
margin-top:8px;
border-radius:10px;
}

.small{font-size:12px;color:#aaa}
</style>
</head>

<body>

<header>💳 BudgetFam PRO</header>

<div class="container">

<!-- AUTH -->
<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#2ecc8a">Signup</button>
<div id="msg" class="small"></div>
</div>

<!-- APP -->
<div id="app">

<div class="card">
<h3>Ajouter transaction</h3>
<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">
<select id="cat">
<option>Alimentation</option>
<option>Transport</option>
<option>Loisirs</option>
<option>Santé</option>
<option>Logement</option>
</select>
<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
