<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>V12 PRO Budget Family</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  background: #111827;
  text-align: center;
  font-size: 18px;
}

.container {
  padding: 15px;
}

.card {
  background: #1f2937;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

input, button, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #3b82f6;
  color: white;
  font-weight: bold;
}

.row {
  display: flex;
  gap: 10px;
}

.row > div {
  flex: 1;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>💰 V12 PRO FAMILY BUDGET</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Connexion</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

  <div class="card">
    <h3>📊 Résumé famille</h3>
    <p id="balance">Solde: 0 ₪</p>
  </div>

  <!-- ADD TRANSACTION -->
  <div class="card">
    <h3>➕ Ajouter transaction</h3>

    <select id="type">
      <option value="income">Revenu</option>
      <option value="expense">Dépense</option>
    </select>

    <input id="amount" type="number" placeholder="Montant">
    <input id="label" placeholder="Description">

    <button onclick="addTransaction()">Ajouter</button>
  </div>

  <!-- PDF IMPORT -->
  <div class="card">
    <h3>📄 Import PDF banque</h3>
    <input type="file" id="pdfFile">
    <button onclick="importPDF()">Importer</button>
  </div>

  <!-- CHART -->
  <div class="card">
    <h3>📈 Graphique</h3>
    <canvas id="chart"></canvas>
  </div>

  <!-- LIST -->
  <div class="card">
    <h3>📋 Transactions</h3>
    <div id="list"></div>
  </div>

</div>
</div>

<script>

/* =========================
   SUPABASE CONFIG
========================= */
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   STATE
========================= */
let transactions = JSON.parse(localStorage.getItem("tx") || "[]");

/* =========================
   LOGIN
========================= */
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("Erreur login");
    return;
  }

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  load();
}

/* =========================
   ADD TRANSACTION
========================= */
function addTransaction(){
  const type = document.getElementById("type").value;
  const amount = parseFloat(document.getElementById("amount").value);
  const label = document.getElementById("label").value;

  if(!amount) return;

  transactions.push({
    type,
    amount,
    label,
    date: new Date().toISOString()
  });

  save();
  load();
}

/* =========================
   SAVE LOCAL + (future sync)
========================= */
function save(){
  localStorage.setItem("tx", JSON.stringify(transactions));
}

/* =========================
   LOAD DASHBOARD
========================= */
function load(){

  let balance = 0;

  let html = "";

  transactions.forEach(t => {
    if(t.type === "income") balance += t.amount;
    else balance -= t.amount;

    html += `
      <div>
        ${t.label} - ${t.amount}₪ (${t.type})
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("balance").innerText = "Solde: " + balance + " ₪";

  drawChart();
}

/* =========================
   CHART
========================= */
function drawChart(){

  const ctx = document.getElementById("chart");

  const income = transactions.filter(t => t.type==="income")
    .reduce((a,b)=>a+b.amount,0);

  const expense = transactions.filter(t => t.type==="expense")
    .reduce((a,b)=>a+b.amount,0);

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Revenus", "Dépenses"],
      datasets: [{
        data: [income, expense]
      }]
    }
  });
}

/* =========================
   PDF IMPORT (SAFE MODE)
========================= */
async function importPDF(){

  const file = document.getElementById("pdfFile").files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(){

    const typedarray = new Uint8Array(this.result);

    const pdf = await pdfjsLib.getDocument({data: typedarray}).promise;

    let text = "";

    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();

      content.items.forEach(item=>{
        text += item.str + " ";
      });
    }

    // SIMPLE PARSER (banque style)
    const numbers = text.match(/\d+[\.,]?\d*/g);

    if(numbers){
      numbers.slice(0,20).forEach(n=>{
        transactions.push({
          type:"expense",
          amount: parseFloat(n),
          label:"PDF Import",
          date:new Date().toISOString()
        });
      });
    }

    save();
    load();

    alert("PDF importé");
  };

  reader.readAsArrayBuffer(file);
}

/* INIT */
load();

</script>

</body>
</html>
