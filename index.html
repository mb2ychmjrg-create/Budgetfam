<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>FinanceAI 🇮🇱</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #07070c; --card: #11111a; --border: #232336;
            --p1: #7c3aed; --p2: #9333ea; --green: #22c55e; --red: #ef4444;
            --text: #e2e2f0; --muted: #8888aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 20px; background: linear-gradient(135deg, #3b0764, #7c3aed); display: flex; justify-content: space-between; align-items: center; }
        .content { flex: 1; padding: 15px; padding-bottom: 100px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--p1); color: white; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* Auth Styles */
        .auth-wrap { padding: 40px 20px; text-align: center; }
        .field { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: white; }
        
        /* Import Styles */
        .drop-zone { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; }
        .status { margin-top: 10px; font-size: 13px; padding: 10px; border-radius: 8px; display: none; }
        
        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 430px; background: var(--card); display: flex; border-top: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 15px; text-align: center; background: none; border: none; color: var(--muted); cursor: pointer; }
        .nav-btn.active { color: var(--p1); }
        
        .tx-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .tx-amt { font-weight: bold; }
        .spinner { animation: spin 1s linear infinite; display: inline-block; width: 12px; height: 12px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-section" class="auth-wrap">
        <h1>💰 FinanceAI 🇮🇱</h1>
        <p style="color:var(--muted); margin-bottom:20px;">Gestion de budget pour familles israéliennes</p>
        <input type="email" id="email" class="field" placeholder="Email">
        <input type="password" id="password" class="field" placeholder="Mot de passe">
        <button class="btn" onclick="handleAuth()">Se connecter / S'inscrire</button>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div>
                <div style="font-weight:800;">FinanceAI</div>
                <div id="user-welcome" style="font-size:12px; opacity:0.8;">Bonjour</div>
            </div>
            <button onclick="signOut()" style="background:none; border:none; color:white; font-size:12px;">Déconnexion</button>
        </header>

        <div class="content">
            <div id="page-home" class="page">
                <div class="card" id="balance-card">
                    <div style="font-size:12px; color:var(--muted);">Solde estimé</div>
                    <div id="total-balance" style="font-size:32px; font-weight:800;">0 ₪</div>
                </div>
                <h3>Transactions récentes</h3>
                <div id="tx-list"></div>
            </div>

            <div id="page-import" class="page" style="display:none;">
                <div class="card">
                    <h3>Importer un PDF Hapoalim</h3>
                    <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">Le format PDF numérique est supporté.</p>
                    <div class="drop-zone" onclick="document.getElementById('pdf-file').click()">
                        <div style="font-size:30px;">📄</div>
                        <div>Cliquez pour choisir le PDF</div>
                    </div>
                    <input type="file" id="pdf-file" hidden accept="application/pdf" onchange="processPDF(this.files[0])">
                    <div id="import-status" class="status"></div>
                </div>
            </div>
        </div>

        <nav>
            <button class="nav-btn active" onclick="showPage('home')">🏠 Accueil</button>
            <button class="nav-btn" onclick="showPage('import')">📄 Importer</button>
        </nav>
    </div>
</div>

<script>
// --- CONFIGURATION SUPABASE ---
const SB_URL = 'https://nyywcxcahalxazienuav.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55eXdjeGNhaGFseGF6aWVudWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjMwNzcsImV4cCI6MjA5MTYzOTA3N30._98bpQLnWA6fBiEgbWYPH8RGaWFRj8zIfMGgZe_KopM';
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentUser = null;

// --- AUTHENTIFICATION ---
async function handleAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // Essai de connexion
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    
    if (error) {
        // Si erreur, on essaie de créer un compte
        const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
        if (signUpError) alert(signUpError.message);
        else alert("Compte créé ! Vous pouvez vous connecter.");
    } else {
        currentUser = data.user;
        initApp();
    }
}

async function signOut() {
    await supabaseClient.auth.signOut();
    location.reload();
}

function initApp() {
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    document.getElementById('user-welcome').innerText = `Bonjour ${currentUser.email}`;
    loadTransactions();
}

// --- NAVIGATION ---
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById('page-' + pageId).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

// --- LOGIQUE PDF ---
async function processPDF(file) {
    if (!file) return;
    const status = document.getElementById('import-status');
    status.style.display = 'block';
    status.style.background = '#1e1b4b';
    status.innerHTML = '<span class="spinner"></span> Lecture du PDF...';

    try {
        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let transactions = [];

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                // Analyse ligne par ligne
                const lines = extractLines(textContent.items);
                const pageTxs = parseHapoalimLines(lines);
                transactions = transactions.concat(pageTxs);
            }

            if (transactions.length > 0) {
                await saveToSupabase(transactions);
                status.style.background = '#064e3b';
                status.innerText = `✅ ${transactions.length} transactions importées !`;
                loadTransactions();
            } else {
                status.style.background = '#7f1d1d';
                status.innerText = "❌ Aucune donnée trouvée. Utilisez un PDF numérique (pas un scan).";
            }
        };
        reader.readAsArrayBuffer(file);
    } catch (e) {
        status.innerText = "Erreur: " + e.message;
    }
}

function extractLines(items) {
    const rows = {};
    items.forEach(item => {
        const y = Math.round(item.transform[5] / 5) * 5; // Regrouper par ligne Y
        if (!rows[y]) rows[y] = [];
        rows[y].push({ x: item.transform[4], str: item.str });
    });
    // Trier du haut vers le bas
    const sortedY = Object.keys(rows).sort((a, b) => b - a);
    return sortedY.map(y => rows[y].sort((a, b) => a.x - b.x).map(it => it.str).join(' '));
}

function parseHapoalimLines(lines) {
    const found = [];
    // Format Hapoalim: DD/MM/YY (ou YYYY) + Description + Montant
    const dateRegex = /(\d{2}\/\d{2}\/\d{2,4})/;
    
    lines.forEach(line => {
        const dateMatch = line.match(dateRegex);
        if (dateMatch) {
            // On cherche un montant à la fin de la ligne (ex: 1,250.50 ou 45.00-)
            const parts = line.split(/\s+/);
            let amount = 0;
            let label = line.replace(dateMatch[0], '').trim();

            // Recherche d'un nombre avec virgule/point
            const amountMatch = line.match(/(-?[\d,]+\.\d{2})/);
            if (amountMatch) {
                amount = parseFloat(amountMatch[0].replace(/,/g, ''));
                label = label.replace(amountMatch[0], '').trim();
                
                // Si la ligne contient "חובה" ou si le montant est une dépense type
                // Dans les PDF Hapoalim, les dépenses sont souvent marquées par leur position
                // Ici on simplifie : si pas de mots clés revenus, c'est négatif
                const isIncome = /משכורת|זיכוי|הפקדה|קצבה/i.test(line);
                if (!isIncome && amount > 0) amount = -amount;

                found.push({
                    date: formatDate(dateMatch[0]),
                    label: label || "Transaction",
                    amount: amount,
                    category: "Auto"
                });
            }
        }
    });
    return found;
}

function formatDate(str) {
    const p = str.split('/');
    const year = p[2].length === 2 ? '20' + p[2] : p[2];
    return `${year}-${p[1]}-${p[0]}`;
}

async function saveToSupabase(txs) {
    const toInsert = txs.map(t => ({
        user_id: currentUser.id,
        label: t.label,
        amount: t.amount,
        category: t.category,
        created_at: new Date(t.date).toISOString()
    }));
    await supabaseClient.from('transactions').insert(toInsert);
}

async function loadTransactions() {
    const { data, error } = await supabaseClient
        .from('transactions')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

    if (data) {
        const list = document.getElementById('tx-list');
        let total = 0;
        list.innerHTML = data.map(t => {
            total += t.amount;
            return `
                <div class="tx-item">
                    <div>
                        <div style="font-size:14px;">${t.label}</div>
                        <div style="font-size:10px; color:var(--muted);">${new Date(t.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="tx-amt" style="color:${t.amount > 0 ? 'var(--green)' : 'var(--red)'}">
                        ${t.amount.toLocaleString()} ₪
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('total-balance').innerText = `${Math.round(total).toLocaleString()} ₪`;
    }
}
</script>
</body>
</html>
