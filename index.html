<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFam V6</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0f14;
color:#e5e7eb;
}

header{
background:#0f172a;
padding:18px;
text-align:center;
font-weight:800;
}

.page{display:none;padding:14px;}
.active{display:block;}

.card{
background:#111827;
padding:14px;
border-radius:14px;
margin-bottom:12px;
border:1px solid #1f2937;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:14px;
}

input,select{
background:#0b1220;
color:white;
border:1px solid #1f2937;
}

button{
background:#3b82f6;
color:white;
font-weight:700;
}

.tx{
padding:10px 0;
border-bottom:1px solid #1f2937;
}

.badge{
display:inline-block;
padding:4px 8px;
border-radius:6px;
font-size:11px;
margin-left:6px;
}

.income{background:#16a34a;}
.expense{background:#dc2626;}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:#0f172a;
border-top:1px solid #1f2937;
}

.nav div{
flex:1;
text-align:center;
padding:12px;
font-size:12px;
cursor:pointer;
}

#debug{
position:fixed;
bottom:60px;
left:0;
right:0;
background:black;
color:#22c55e;
font-size:11px;
height:70px;
overflow:auto;
padding:6px;
}
</style>
</head>

<body>

<header>💰 BudgetFam V6</header>

<div id="debug">DEBUG READY</div>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">

<div class="card">
<h3>📊 Dashboard</h3>
<div id="summary">...</div>
</div>

<div class="card">
<h3>📄 Transactions</h3>
<div id="list"></div>
</div>

</div>

<!-- ADD -->
<div id="add" class="page">

<div class="card">
<h3>➕ Ajouter transaction</h3>

<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">

<select id="type">
<option value="expense">Dépense</option>
<option value="income">Revenu</option>
</select>

<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>📥 Import PDF</h3>
<input type="file" onchange="handleFile(this)">
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="go('home')">🏠 Home</div>
<div onclick="go('add')">➕ Add</div>
<div onclick="loadTx()">🔄 Refresh</div>
</div>

<script src="script.js"></script>
</body>
</html>
