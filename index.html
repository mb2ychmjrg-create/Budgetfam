<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FinanceAI 🇮🇱</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#07070c;--card:#11111a;--card2:#191927;--border:#232336;
            --p1:#7c3aed;--p2:#9333ea;--p3:#a855f7;
            --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
            --text:#e2e2f0;--muted:#8888aa;
        }
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;overflow:hidden}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}

        #app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative}
        
        header{
            padding:16px 18px;background:linear-gradient(135deg,#3b0764,#5b21b6,#7c3aed);
            display:none;justify-content:space-between;align-items:center;
            padding-top:max(16px,env(safe-area-inset-top));box-shadow:0 4px 24px rgba(124,58,237,.3);z-index:10;
        }
        .h-title{font-size:18px;font-weight:800}
        .h-sub{font-size:11px;opacity:0.8}
        .logout-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:6px 10px;color:white;font-size:11px;cursor:pointer}

        .content{flex:1;overflow-y:auto;padding:16px 16px 100px;display:none}
        .page{display:none;animation:fadeUp .3s ease both}
        .page.active{display:block}

        #auth-page{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
        .auth-logo{font-size:60px;margin-bottom:10px}
        .auth-title{font-size:28px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .tabs{display:flex;background:var(--card);border-radius:14px;padding:4px;width:100%;margin:20px 0}
        .tab{flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;background:transparent;color:var(--muted);font-weight:600;font-family:inherit}
        .tab.active{background:var(--p1);color:white}

        .field{width:100%;padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:15px;margin-bottom:12px;font-family:inherit;text-align:right}
        .btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(90deg,var(--p1),var(--p2));color:white;font-weight:700;font-size:16px;cursor:pointer;font-family:inherit}
        .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}
        
        .nav{
            position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
            background:var(--card);border-top:1px solid var(--border);display:none;padding-bottom:env(safe-area-inset-bottom);z-index:100;
        }
        .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;background:none;border:none;color:var(--muted);cursor:pointer;font-family:inherit}
        .nav-btn.active{color:var(--p2)}
        .nav-btn span:first-child{font-size:20px}
        .nav-btn span:last-child{font-size:10px;font-weight:600}

        .tx-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
        .tx-info{display:flex;align-items:center;gap:12px}
        .tx-icon{width:40px;height:40px;background:var(--card2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
        .tx-amount{font-weight:800;font-size:15px}
        .spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
    </style>
</head>
<body>

<div id="app">
    <header id="app-header">
        <div>
            <div class="h-title">💰 FinanceAI</div>
            <div class="h-sub" id="user-greeting">שלום!</div>
        </div>
        <button class="logout-btn" onclick="logout()">התנתק</button>
    </header>

    <div id="auth-page">
        <div class="auth-logo">🇮🇱</div>
        <div class="auth-title">FinanceAI</div>
        <p style="color:var(--muted);margin-top:8px">ניהול כספים חכם למשפחה</p>
        <div class="tabs">
            <button class="tab active" onclick="setAuthMode('login', this)">התחברות</button>
            <button class="tab" onclick="setAuthMode('signup', this)">הרשמה</button>
        </div>
        <input type="email" id="a-email" class="field" placeholder="אימייל">
        <input type="password" id="a-pass" class="field" placeholder="סיסמה">
        <button class="btn" id="auth-btn" onclick="handleAuth()">התחבר</button>
    </div>

    <main class="content" id="main-content">
        <div id="pg-home" class="page active">
            <div class="card" style="background:linear-gradient(135deg,#1e0a4e,#2d1264);border:none">
                <div style="font-size:12px;opacity:0.7">יתרה כוללת</div>
                <div style="font-size:32px;font-weight:800;margin:5px 0" id="total-balance">₪ 0.00</div>
            </div>
            <h3 style="margin-bottom:12px">פעולות אחרונות</h3>
            <div id="tx-list"></div>
        </div>

        <div id="pg-add" class="page">
            <h3>הוספת פעולה חדשה ➕</h3>
            <div class="card" style="margin-top:15px">
                <input type="text" id="tx-label" class="field" placeholder="תיאור (למשל: סופרמרקט)">
                <input type="number" id="tx-amount" class="field" placeholder="סכום ב-₪">
                <select id="tx-cat" class="field">
                    <option value="Alimentation">מזון 🛒</option>
                    <option value="Transport">תחבורה 🚗</option>
                    <option value="Loisirs">פנאי 🎮</option>
                    <option value="Divers">שונות 📦</option>
                </select>
                <button class="btn" onclick="addTransaction()">שמור פעולה</button>
            </div>
        </div>

        <div id="pg-import" class="page"><h3>ייבוא נתונים 📄</h3><p>בקרוב...</p></div>
        <div id="pg-stats" class="page"><h3>סטטיסטיקה 📊</h3><div id="stats-container"></div></div>
    </main>

    <nav class="nav" id="app-nav">
        <button class="nav-btn active" onclick="go('home', this)"><span>🏠</span><span>בית</span></button>
        <button class="nav-btn" onclick="go('add', this)"><span>➕</span><span>הוספה</span></button>
        <button class="nav-btn" onclick="go('import', this)"><span>📄</span><span>ייבוא</span></button>
        <button class="nav-btn" onclick="go('stats', this)"><span>📊</span><span>נתונים</span></button>
    </nav>
</div>

<script>
    // CONFIGURATION AVEC TES CLÉS
    const SB_URL = 'https://nyywcxchahalxazientuav.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55eXdjeGNhaGFseGF6aWVudWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjMwNzcsImV4cCI6MjA5MTYzOTA3N30._98bpQLnWA6fBiEgbWYPH8RGaWFRj8zIfMGgZe_KopM';
    const sb = supabase.createClient(SB_URL, SB_KEY);
    let currentUser = null;

    async function handleAuth() {
        const email = document.getElementById('a-email').value;
        const pass = document.getElementById('a-pass').value;
        const btn = document.getElementById('auth-btn');
        const isLogin = btn.innerText === 'התחבר';

        try {
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="margin:auto"></div>';
            
            const { data, error } = isLogin 
                ? await sb.auth.signInWithPassword({ email, password: pass })
                : await sb.auth.signUp({ email, password: pass });

            if (error) throw error;
            currentUser = data.user;
            showApp();
        } catch (err) {
            alert("שגיאה: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = isLogin ? 'התחבר' : 'הרשמה';
        }
    }

    function setAuthMode(mode, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('auth-btn').innerText = mode === 'login' ? 'התחבר' : 'הרשמה';
    }

    function go(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('pg-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        if(pageId === 'home') loadTransactions();
    }

    function showApp() {
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('app-header').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('app-nav').style.display = 'flex';
        document.getElementById('user-greeting').innerText = `שלום, ${currentUser.email.split('@')[0]} 👋`;
        loadTransactions();
    }

    async function addTransaction() {
        const label = document.getElementById('tx-label').value;
        const amount = document.getElementById('tx-amount').value;
        const category = document.getElementById('tx-cat').value;

        if(!label || !amount) return alert("נא למלא את כל השדות");

        const { error } = await sb.from('transactions').insert([
            { user_id: currentUser.id, label, amount: parseFloat(amount), category, created_at: new Date() }
        ]);

        if (error) alert(error.message);
        else {
            alert("הפעולה נוספה בהצלחה!");
            document.getElementById('tx-label').value = '';
            document.getElementById('tx-amount').value = '';
            go('home');
        }
    }

    async function loadTransactions() {
        const list = document.getElementById('tx-list');
        list.innerHTML = '<div class="spinner" style="margin:20px auto; border-top-color:var(--p1)"></div>';

        const { data, error } = await sb.from('transactions')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            list.innerHTML = "שגיאה בטעינת נתונים";
            return;
        }

        let total = 0;
        list.innerHTML = data.map(tx => {
            total += tx.amount;
            return `
                <div class="tx-item">
                    <div class="tx-info">
                        <div class="tx-icon">${getIcon(tx.category)}</div>
                        <div>
                            <div style="font-weight:600">${tx.label}</div>
                            <div style="font-size:10px; color:var(--muted)">${new Date(tx.created_at).toLocaleDateString('he-IL')}</div>
                        </div>
                    </div>
                    <div class="tx-amount" style="color:${tx.amount > 0 ? 'var(--green)' : 'var(--red)'}">
                        ₪ ${Math.abs(tx.amount).toFixed(2)}
                    </div>
                </div>
            `;
        }).join('') || '<p style="text-align:center;color:var(--muted)">אין פעולות עדיין</p>';

        document.getElementById('total-balance').innerText = `₪ ${total.toFixed(2)}`;
    }

    function getIcon(cat) {
        const icons = { 'Alimentation': '🛒', 'Transport': '🚗', 'Loisirs': '🎮', 'Divers': '📦' };
        return icons[cat] || '💸';
    }

    async function logout() {
        await sb.auth.signOut();
        location.reload();
    }

    sb.auth.onAuthStateChange((event, session) => {
        if (session) {
            currentUser = session.user;
            showApp();
        }
    });
</script>
</body>
</html>
