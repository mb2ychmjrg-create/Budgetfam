<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>פיננסAI 🇮🇱</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#07070c;--card:#11111a;--card2:#191927;--border:#232336;
            --p1:#7c3aed;--p2:#9333ea;--p3:#a855f7;
            --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
            --text:#e2e2f0;--muted:#8888aa;
        }
        html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;overflow:hidden;direction:rtl}
        
        #app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative}
        
        header{padding:16px 18px;background:linear-gradient(135deg,#3b0764,#5b21b6,#7c3aed);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;padding-top:max(16px,env(safe-area-inset-top));box-shadow:0 4px 24px rgba(124,58,237,.3)}
        .h-title{font-size:18px;font-weight:800}
        .logout-btn{background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:6px 12px;color:white;font-size:11px}

        .content{flex:1;overflow-y:auto;padding:14px 14px 100px;-webkit-overflow-scrolling:touch}
        
        /* Formulaire & Champs */
        .field{width:100%;padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:16px;margin-bottom:12px;text-align:right}
        .sel{width:100%;padding:14px;border-radius:12px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:16px;margin-bottom:12px;direction:rtl}
        .lbl{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;padding-right:4px}
        .btn{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(90deg,var(--p1),var(--p2));color:white;font-weight:800;font-size:16px;cursor:pointer}

        /* Navigation iPhone */
        .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:1000}
        .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;background:none;border:none;color:var(--muted)}
        .nav-btn.active{color:var(--p2)}
        .nav-btn span:first-child{font-size:22px}
        .nav-btn span:last-child{font-size:10px;font-weight:700}

        /* Cards */
        .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px}
        .page{display:none}
        .page.active{display:block;animation:fadeUp 0.3s ease-out}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        
        .tx-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
        .tx-amount{font-weight:700;font-size:15px}
    </style>
</head>
<body>

<div id="app">
    <div id="auth-page" class="content" style="display:block">
        <div style="text-align:center;padding-top:60px">
            <div style="font-size:60px">💰</div>
            <h1 style="font-size:28px;margin:10px 0">פיננסAI</h1>
            <p style="color:var(--muted);margin-bottom:30px">ניהול תקציב חכם לאייפון</p>
            <input class="field" id="a-email" type="email" placeholder="אימייל" style="direction:ltr;text-align:left">
            <input class="field" id="a-pass" type="password" placeholder="סיסמה" style="direction:ltr;text-align:left">
            <button class="btn" onclick="doAuth()">התחברות</button>
        </div>
    </div>

    <header id="app-header" style="display:none">
        <div class="h-title">💰 פיננסAI</div>
        <button class="logout-btn" onclick="location.reload()">יציאה</button>
    </header>

    <div class="content" id="main-content" style="display:none">
        
        <div id="pg-home" class="page active">
            <div class="card" style="background:linear-gradient(135deg,#1e0a4e,#2d1264);border:none">
                <div style="font-size:12px;opacity:0.8">יתרה נוכחית</div>
                <div style="font-size:32px;font-weight:800;margin:5px 0" id="total-balance">0 ₪</div>
            </div>
            <div id="tx-list"></div>
        </div>

        <div id="pg-add" class="page">
            <h2 style="margin-bottom:15px">הוספת פעולה</h2>
            <div class="card">
                <span class="lbl">סוג הפעולה</span>
                <select class="sel" id="tx-type" onchange="updateCategories()">
                    <option value="expense">💸 הוצאה (Sortie)</option>
                    <option value="income">💰 הכנסה (Entrée)</option>
                </select>

                <span class="lbl">תיאור</span>
                <input class="field" id="tx-label" placeholder="לדוגמא: סופרמרקט">

                <span class="lbl">סכום</span>
                <input class="field" id="tx-amount" type="number" inputmode="decimal" placeholder="0.00">

                <span class="lbl">קטגוריה</span>
                <select class="sel" id="tx-cat">
                    </select>

                <button class="btn" onclick="addTx()">שמור פעולה</button>
            </div>
        </div>
    </div>

    <nav class="nav" id="app-nav" style="display:none">
        <button class="nav-btn active" onclick="go('home',this)"><span>🏠</span><span>בית</span></button>
        <button class="nav-btn" onclick="go('add',this)"><span>➕</span><span>הוסף</span></button>
        <button class="nav-btn" onclick="alert('בקרוב!')"><span>📊</span><span>נתונים</span></button>
    </nav>
</div>

<script>
    // Configuration Catégories Classées
    const CATEGORIES = {
        expense: [
            { val: 'Alimentation', label: '🛒 מזון וקניות' },
            { val: 'Transport', label: '⛽ תחבורה ודלק' },
            { val: 'Logement', label: '🏠 דיור וחשבונות' },
            { val: 'Loisirs', label: '🍕 פנאי ומסעדות' },
            { val: 'Santé', label: '💊 בריאות' },
            { val: 'Divers', label: '📦 שונות' }
        ],
        income: [
            { val: 'Salaire', label: '💼 משכורת' },
            { val: 'Virement', label: '📩 העברה נכנסת' },
            { val: 'Cadeau', label: '🎁 מתנה' },
            { val: 'Autre', label: '💰 הכנסה אחרת' }
        ]
    };

    function updateCategories() {
        const type = document.getElementById('tx-type').value;
        const catSelect = document.getElementById('tx-cat');
        const list = CATEGORIES[type];
        
        catSelect.innerHTML = list.map(c => `<option value="${c.val}">${c.label}</option>`).join('');
    }

    function doAuth() {
        // Simulation pour démo
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('app-header').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('app-nav').style.display = 'flex';
        updateCategories();
    }

    function go(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('pg-' + pageId).classList.add('active');
        btn.classList.add('active');
    }

    let transactions = [];

    function addTx() {
        const label = document.getElementById('tx-label').value;
        const amount = parseFloat(document.getElementById('tx-amount').value);
        const type = document.getElementById('tx-type').value;
        const cat = document.getElementById('tx-cat').value;

        if(!label || !amount) return alert("נא למלא שדות");

        const finalAmount = type === 'expense' ? -Math.abs(amount) : Math.abs(amount);
        
        transactions.unshift({ label, amount: finalAmount, cat });
        renderList();
        
        // Reset
        document.getElementById('tx-label').value = '';
        document.getElementById('tx-amount').value = '';
        go('home', document.querySelectorAll('.nav-btn')[0]);
    }

    function renderList() {
        const listEl = document.getElementById('tx-list');
        const balanceEl = document.getElementById('total-balance');
        
        let total = 0;
        listEl.innerHTML = transactions.map(t => {
            total += t.amount;
            const color = t.amount > 0 ? 'var(--green)' : 'var(--red)';
            const prefix = t.amount > 0 ? '+' : '';
            return `
                <div class="tx-item">
                    <div>
                        <div style="font-weight:600">${t.label}</div>
                        <div style="font-size:11px;color:var(--muted)">${t.cat}</div>
                    </div>
                    <div class="tx-amount" style="color:${color}">${prefix}${t.amount} ₪</div>
                </div>
            `;
        }).join('');
        
        balanceEl.textContent = total.toLocaleString() + ' ₪';
        balanceEl.style.color = total >= 0 ? 'white' : 'var(--red)';
    }

    // Init
    updateCategories();
</script>

</body>
</html>
