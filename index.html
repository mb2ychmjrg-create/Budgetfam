<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget V12 Auto PDF</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">
<button onclick="handleLogin()">התחבר</button>
<button onclick="logout()">Logout</button>

<hr>

<h2>Import PDF Banque</h2>

<input type="file" id="pdfFile">
<button onclick="processPDF()">Analyser PDF</button>

<p id="status"></p>

<hr>

<h3>Transactions</h3>
<div id="transactions"></div>

<!-- =========================
SUPABASE
========================= -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://nyywcxcahalxazienuav.supabase.co";
const SUPABASE_KEY = "sb_publishable_sJ38oz";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =========================
LOGIN
========================= */
async function handleLogin() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  localStorage.setItem("user", JSON.stringify(data.user));
  alert("Connecté ✔");
}

/* =========================
LOGOUT
========================= */
async function logout() {
  await supabaseClient.auth.signOut();
  localStorage.removeItem("user");
  location.reload();
}

/* =========================
UPLOAD + PROCESS PDF
========================= */
async function processPDF() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return alert("Login requis");

  const file = document.getElementById("pdfFile").files[0];
  if (!file) return alert("Choisis un PDF");

  document.getElementById("status").innerText = "Upload en cours...";

  const path = `${user.id}/${Date.now()}-${file.name}`;

  /* 1. Upload PDF */
  const { error: uploadError } = await supabaseClient.storage
    .from("bank-pdfs")
    .upload(path, file);

  if (uploadError) {
    document.getElementById("status").innerText = uploadError.message;
    return;
  }

  document.getElementById("status").innerText = "Analyse du PDF...";

  /* 2. Call Edge Function (IMPORTANT) */
  const { data, error } = await supabaseClient.functions.invoke(
    "parse-bank-pdf",
    {
      body: {
        path: path,
        user_id: user.id
      }
    }
  );

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  document.getElementById("status").innerText = "Import terminé ✔";

  loadTransactions();
}

/* =========================
LOAD TRANSACTIONS
========================= */
async function loadTransactions() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return;

  const { data } = await supabaseClient
    .from("transactions")
    .select("*")
    .eq("user_id", user.id)
    .order("date", { ascending: false });

  const box = document.getElementById("transactions");
  box.innerHTML = "";

  data.forEach(t => {
    box.innerHTML += `
      <div>
        <b>${t.title}</b> | ${t.amount} ₪ | ${t.date}
      </div>
    `;
  });
}

window.onload = () => {
  loadTransactions();
};
</script>

</body>
</html>
