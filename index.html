<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFam V3</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:linear-gradient(180deg,#0b1220,#070a12);
color:white;
}

header{
padding:24px;
font-size:22px;
font-weight:800;
text-align:center;
}

.container{
padding:12px;
}

.card{
background:#141b2d;
margin:10px 0;
padding:14px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
font-size:14px;
}

button{
background:#4f8ef7;
color:white;
font-weight:700;
}

button.green{background:#22c55e;}

.tx{
padding:10px 0;
border-bottom:1px solid #263042;
}

.small{font-size:12px;color:#9aa4b2}

#debug{
position:fixed;
bottom:0;
left:0;
right:0;
height:120px;
background:black;
color:#00ff88;
font-size:11px;
overflow:auto;
padding:8px;
}
.hidden{display:none;}
</style>
</head>

<body>

<header>💰 BudgetFam V3</header>

<div class="container">

<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Login</button>
<button onclick="signup()" class="green">Signup</button>
</div>

<div id="app" class="hidden">

<div class="card">
<h3>Ajouter transaction</h3>
<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">
<select id="cat">
<option>Alimentation</option>
<option>Transport</option>
<option>Loisirs</option>
<option>Santé</option>
<option>Logement</option>
</select>
<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>Import PDF</h3>
<input type="file" onchange="handleFile(this)">
<div class="small">Upload relevé bancaire PDF</div>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

</div>

<div id="debug">DEBUG INIT ✔</div>

<script src="script.js"></script>
</body>
</html>
