<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFam PRO 💰</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui,-apple-system;
background:linear-gradient(135deg,#0A0F14,#111A2E);
color:#fff;
}

header{
padding:20px;
font-size:22px;
font-weight:800;
text-align:center;
letter-spacing:0.5px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter: blur(10px);
margin:12px;
padding:16px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input,button,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
font-size:14px;
}

input,select{
background:#0f172a;
color:#fff;
}

button{
background:linear-gradient(135deg,#4F8EF7,#6C5CE7);
color:#fff;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

.tx{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.small{
font-size:12px;
color:#aaa;
margin-top:6px;
}
</style>
</head>

<body>

<header>💰 BudgetFam PRO</header>

<div id="auth" class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Login</button>
<button onclick="signup()" style="background:#2ECC8A">Signup</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3>Ajouter</h3>
<input id="label" placeholder="Description">
<input id="amount" type="number" placeholder="Montant">
<select id="cat">
<option>Alimentation</option>
<option>Transport</option>
<option>Loisirs</option>
<option>Santé</option>
<option>Logement</option>
</select>
<button onclick="addTx()">Ajouter</button>
</div>

<div class="card">
<h3>Import PDF</h3>
<input type="file" onchange="handleFile(this)">
<div class="small">PDF bancaire (mode debug)</div>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
