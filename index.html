<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0D0F14;--card:#161A23;--border:#232840;
  --accent:#4F8EF7;--accent-soft:#1E2D50;
  --green:#2ECC8A;--green-soft:#0E3028;
  --red:#F7506A;--red-soft:#3A1020;
  --yellow:#F7C948;--yellow-soft:#3A2E0A;
  --purple:#A78BFA;--purple-soft:#1E1640;
  --orange:#FB923C;--orange-soft:#2A1500;
  --text:#E8EAF2;--muted:#6B7280;--divider:#1E2230;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
.syne{font-family:'Syne',sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes barGrow{from{width:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fu{animation:fadeUp .4s ease both;}
.fu1{animation-delay:.04s}.fu2{animation-delay:.1s}.fu3{animation-delay:.17s}.fu4{animation-delay:.24s}.fu5{animation-delay:.31s}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;}

/* AUTH */
.auth-screen{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:30px 24px;background:var(--bg);}
.auth-logo{font-size:48px;margin-bottom:8px;}
.auth-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:4px;font-family:'Syne',sans-serif;}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:36px;text-align:center;line-height:1.5;}
.auth-tabs{display:flex;background:var(--card);border-radius:14px;padding:4px;margin-bottom:24px;width:100%;}
.auth-tab{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:13px;background:transparent;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
.auth-tab.active{background:var(--accent);color:#fff;}
.field-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;width:100%;}
.field{width:100%;padding:13px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:14px;}
.field:focus{border-color:var(--accent);}
.btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .3s;margin-top:4px;}
.btn-primary:active{opacity:.8;}
.btn-primary.loading{opacity:.6;pointer-events:none;}
.auth-error{background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;width:100%;text-align:center;}
.auth-success{background:var(--green-soft);color:var(--green);border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;width:100%;text-align:center;}

/* HEADER */
.header{padding:14px 18px 12px;border-bottom:1px solid var(--divider);display:flex;justify-content:space-between;align-items:center;background:var(--bg);flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top));}
.header-title{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.logout-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* LAYOUT */
.content{flex:1;overflow-y:auto;padding:14px 14px 84px;-webkit-overflow-scrolling:touch;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 10px;border-radius:12px;transition:color .2s;color:var(--muted);}
.nav-item.active{color:var(--accent);}
.nav-item span:first-child{font-size:19px;}
.nav-item span:last-child{font-size:9px;font-weight:600;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:14px;}
.hero{background:linear-gradient(135deg,#1A2540,#0D1428);border:1px solid var(--accent-soft);border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:var(--accent);border-radius:50%;opacity:.07;}
.bar-wrap{background:var(--divider);border-radius:99px;overflow:hidden;}
.bar{border-radius:99px;animation:barGrow .8s cubic-bezier(.4,0,.2,1) both;transition:width .6s;}

/* TRANSACTION */
.tx{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--divider);}
.tx-icon{width:36px;height:36px;border-radius:10px;background:var(--divider);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.select-field{width:100%;padding:12px 14px;border-radius:12px;background:var(--divider);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;margin-bottom:14px;}
.submit-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Syne',sans-serif;transition:background .3s;}

/* VIEWS */
.view{display:none;}.view.active{display:block;}
.sec-title{font-size:14px;font-weight:700;margin-bottom:14px;}
.stat-mini{flex:1;background:var(--divider);border-radius:10px;padding:9px 7px;text-align:center;}
.stat-mini label{font-size:10px;color:var(--muted);display:block;margin-bottom:2px;}
.stat-mini b{font-size:13px;font-weight:700;}

/* SPINNER / EMPTY */
.spinner{display:block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto;}
.empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;}
.empty span{font-size:32px;display:block;margin-bottom:10px;}

/* QUICK-ADD BUTTONS */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.quick-btn{padding:10px 4px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;transition:all .15s;}
.quick-btn:active{transform:scale(.95);}
.quick-btn .q-emoji{font-size:20px;display:block;margin-bottom:3px;}

/* MODAL SHEET */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-sheet{background:var(--bg);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;padding:20px 20px 40px;position:relative;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px;}
.modal-close{position:absolute;top:20px;right:18px;background:var(--divider);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;}

/* PROJECT CARDS */
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:12px;}
.proj-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.proj-type-btn{padding:12px 6px;border-radius:14px;border:1px solid var(--border);background:var(--divider);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;transition:all .2s;}
.proj-type-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.proj-type-btn .pt-emoji{font-size:22px;display:block;margin-bottom:4px;}

/* STEP INDICATOR */
.steps{display:flex;gap:5px;justify-content:center;margin-bottom:20px;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--divider);transition:all .3s;}
.step-dot.done{background:var(--green);}
.step-dot.active{background:var(--accent);width:22px;border-radius:4px;}

/* CHART TABS */
.chart-tabs{display:flex;gap:6px;margin-bottom:16px;}
.chart-tab{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center;}
.chart-tab.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
.chart-panel{display:none;}.chart-panel.active{display:block;}
.legend-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--divider);font-size:12px;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* AI LOADER */
.ai-thinking{display:flex;align-items:center;gap:10px;padding:16px;background:var(--accent-soft);border-radius:14px;margin:12px 0;}
.ai-thinking .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 2px;animation:pulse 1.2s infinite;}
.ai-thinking .dots span:nth-child(2){animation-delay:.2s;}
.ai-thinking .dots span:nth-child(3){animation-delay:.4s;}

/* AI PLAN RESULT */
.ai-result{background:linear-gradient(135deg,#1E2D50,#1E1640);border:1px solid var(--accent);border-radius:16px;padding:16px;margin:12px 0;line-height:1.7;font-size:13px;}
.ai-result strong{color:var(--accent);}
</style>

</head>

// ===== CLAUDE API =====
async function askClaude(userMsg, systemMsg = '') {
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemMsg || 'Tu es un conseiller financier expert pour les familles israéliennes. Réponds en français, de façon concise, chaleureuse et pratique. Utilise des chiffres réels en ₪.',
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    const d = await r.json();
    return d.content?.[0]?.text || '';
  } catch (e) { return ''; }
}

// ===== AUTH =====
let authMode = 'login';
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='signup')));
  document.getElementById('signup-extra').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('auth-msg').innerHTML = '';
}
function showMsg(msg, type='error') {
  document.getElementById('auth-msg').innerHTML = `<div class="auth-${type}">${msg}</div>`;
}
async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-btn');
  if (!email || !password) return showMsg('Remplis tous les champs.');
  btn.classList.add('loading'); btn.textContent = '...';
  if (authMode === 'signup') {
    const name = document.getElementById('auth-name').value.trim() || 'Utilisateur';
    const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) { showMsg(error.message); btn.classList.remove('loading'); btn.textContent = 'Créer mon compte'; return; }
    showMsg('✅ Compte créé ! Vérifie ton email.', 'success');
    btn.classList.remove('loading'); btn.textContent = 'Créer mon compte';
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showMsg('Email ou mot de passe incorrect.'); btn.classList.remove('loading'); btn.textContent = 'Se connecter'; return; }
    currentUser = data.user; enterApp();
  }
}
async function handleLogout() {
  // Simple settings/logout sheet
  const confirmed = confirm('Se déconnecter ?');
  if (!confirmed) return;
  await sb.auth.signOut(); currentUser = null;
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ===== APP ENTRY =====
async function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
  document.getElementById('header-sub').textContent = `Bonjour, ${name} 👋`;
  await loadFamilyData();
  await loadDashboard();
  await loadTransactions();
  loadAiTip();
}

// ===== DASHBOARD =====
async function loadDashboard() {
  const el = document.getElementById('dashboard-content');
  const { data: txs, error } = await sb.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if (error) { el.innerHTML = '<div class="empty"><span>⚠️</span>Erreur de chargement</div>'; return; }
  const all = txs || [];
  // This month only
  const now = new Date();
  const thisMonth = all.filter(t => {
    const d = new Date(t.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const income   = thisMonth.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
  const expenses = thisMonth.filter(t => t.amount < 0).reduce((s,t) => s + Math.abs(t.amount), 0);
  const balance  = income - expenses;
  const pct = income > 0 ? Math.min(100, Math.round((balance / income) * 100)) : 0;

  if (all.length === 0) {
    el.innerHTML = `<div class="hero fu fu1">
      <div style="font-size:11px;color:var(--muted)">Bienvenue sur BudgetFam</div>
      <div class="syne" style="font-size:18px;font-weight:700;margin:6px 0">Commence ici ! 👇</div>
      <p style="color:var(--muted);font-size:12px;line-height:1.6">Utilise les raccourcis ci-dessous pour ajouter ta première dépense ou crée un projet IA.</p>
    </div>`; return;
  }

  el.innerHTML = `
    <div class="hero fu fu1">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
      <div class="syne" style="font-size:28px;font-weight:800;margin:4px 0;color:${balance >= 0 ? 'var(--text)' : 'var(--red)'}">${balance.toLocaleString('fr-FR')} ₪</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Solde du mois</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div class="stat-mini"><label>Revenus</label><b style="color:var(--green)">${income.toLocaleString('fr-FR')} ₪</b></div>
        <div class="stat-mini"><label>Dépenses</label><b style="color:var(--red)">${expenses.toLocaleString('fr-FR')} ₪</b></div>
        <div class="stat-mini"><label>Épargne</label><b style="color:var(--accent)">${pct}%</b></div>
      </div>
      <div class="bar-wrap" style="height:5px"><div class="bar" style="width:${pct}%;height:5px;background:var(--accent)"></div></div>
    </div>`;
}

async function submitTx() {
  const label = txType === 'income' ? document.getElementById('f-cat').value : document.getElementById('f-label').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const category = document.getElementById('f-cat').value;
  if (!amount) return;
  const btn = document.getElementById('submit-btn');
  btn.textContent = '...'; btn.style.background = 'var(--muted)';
  const { error } = await sb.from('transactions').insert({
    user_id: currentUser.id, label,
    amount: txType === 'expense' ? -Math.abs(amount) : Math.abs(amount),
    category,
    ...(currentFamily ? { family_id: currentFamily.id } : {})
  });
  if (error) {
    btn.textContent = 'Erreur — réessayez'; btn.style.background = 'var(--red)';
    setTimeout(() => { btn.textContent = 'Ajouter la transaction'; btn.style.background = 'var(--accent)'; }, 2000);
    return;
  }
  btn.textContent = '✅ Ajouté !'; btn.style.background = 'var(--green)';
  document.getElementById('f-label').value = '';
  document.getElementById('f-amount').value = '';
  setTimeout(() => { btn.textContent = 'Ajouter la transaction'; btn.style.background = 'var(--accent)'; }, 1500);
  await loadDashboard(); await loadTransactions();
  loadAiTip();
}

// ===== AI TIP (via Claude API) =====
async function loadAiTip() {
  const el = document.getElementById('ai-tip');
  if (!el) return;
  el.innerHTML = `<div class="ai-thinking"><div class="dots"><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--accent)">IA en train d'analyser...</span></div>`;

  // Fetch user's spending data for context
  const { data: txs } = await sb.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(30);
  const all = txs || [];

  let context = '';
  if (all.length > 0) {
    const income = all.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
    const expenses = all.filter(t => t.amount < 0).reduce((s,t) => s + Math.abs(t.amount), 0);
    const catMap = {};
    all.filter(t => t.amount < 0).forEach(t => {
      const c = t.category || 'Divers';
      catMap[c] = (catMap[c] || 0) + Math.abs(t.amount);
    });
    const topCat = Object.entries(catMap).sort((a,b) => b[1]-a[1])[0];
    context = `Revenus total: ${income.toLocaleString('fr-FR')} ₪. Dépenses totales: ${expenses.toLocaleString('fr-FR')} ₪. Catégorie principale: ${topCat ? topCat[0] + ' (' + topCat[1].toLocaleString('fr-FR') + ' ₪)' : 'aucune'}. Nombre de transactions: ${all.length}.`;
  }

  const prompt = all.length > 0
    ? `Données utilisateur: ${context}\n\nDonne UN conseil financier personnalisé très court (2-3 lignes max) adapté à une famille israélienne, basé sur ces données. Sois direct, pratique et bienveillant. Commence directement par le conseil.`
    : `Donne UN conseil financier général court (2-3 lignes max) pour les familles israéliennes. Exemple: épargne, supermarché, budget. Commence directement par le conseil.`;

  const tip = await askClaude(prompt);
  if (el) el.textContent = tip || "💡 Essaie d'épargner au moins 10% de tes revenus chaque mois — même petit, l'essentiel est la régularité !";
}

// ===== DELETE TRANSACTION =====
async function deleteTx(id) {
  if (!confirm('Supprimer cette transaction ?')) return;
  const row = document.getElementById('tx-' + id);
  if (row) { row.style.opacity = '0.4'; row.style.pointerEvents = 'none'; }
  const { error } = await sb.from('transactions').delete().eq('id', id).eq('user_id', currentUser.id);
  if (error) { if (row) { row.style.opacity = '1'; row.style.pointerEvents = 'auto'; } alert('Erreur.'); return; }
  if (row) {
    row.style.transition = 'all .3s';
    row.style.maxHeight = row.offsetHeight + 'px';
    requestAnimationFrame(() => { row.style.maxHeight = '0'; row.style.opacity = '0'; row.style.padding = '0'; row.style.overflow = 'hidden'; });
    setTimeout(() => row.remove(), 350);
  }
  await loadDashboard();
}

    <div class="steps"><div class="step-dot done"></div><div class="step-dot done"></div><div class="step-dot done"></div></div>
    <div class="syne" style="font-size:16px;font-weight:800;margin-bottom:12px;text-align:center">✅ Plan IA généré !</div>

    </div>

}

async function saveProject(name, type, date, monthly, aiPlan) {
  const amount = parseFloat(document.getElementById('w-final-amount')?.value) || 0;
  const { error } = await sb.from('projects').insert({
    user_id: currentUser.id,
    name, type,
    target_amount: amount,

    monthly_saving: monthly,
    saved_amount: 0,
    ai_plan: aiPlan,
    meta: wizardMeta,
    ...(currentFamily ? { family_id: currentFamily.id } : {})
  });

async function addToProject(id, name) {

  const { data: proj } = await sb.from('projects').select('saved_amount').eq('id', id).single();

async function deleteProject(id) {

}

// ===== CHARTS =====
function baseOpts() { return { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }; }
function buildDonut(labels, values) {
  if (chartDonut) { chartDonut.destroy(); chartDonut = null; }
  if (!labels.length) return;
  const ctx = document.getElementById('chart-donut').getContext('2d');
  chartDonut = new Chart(ctx, { type:'doughnut', data:{ labels, datasets:[{ data:values, backgroundColor:PALETTE, borderColor:'#161A23', borderWidth:3, hoverOffset:6 }] }, options:{ ...baseOpts(), cutout:'68%', plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed.toLocaleString('fr-FR')} ₪`}} } } });
  const total = values.reduce((a,b)=>a+b,0);
  document.getElementById('donut-legend').innerHTML = labels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></div><div style="flex:1;font-size:12px">${getCatIcon(l)} ${l}</div><div style="font-size:12px;color:var(--muted)">${values[i].toLocaleString('fr-FR')} ₪</div><div style="font-size:11px;color:var(--accent);width:32px;text-align:right">${Math.round(values[i]/total*100)}%</div></div>`).join('');
}
function buildBar(labels, incomeData, expData) {
  if (chartBar) { chartBar.destroy(); chartBar = null; }
  if (!labels.length) return;
  const ctx = document.getElementById('chart-bar').getContext('2d');
  chartBar = new Chart(ctx, { type:'bar', data:{ labels, datasets:[ { label:'Revenus', data:incomeData, backgroundColor:'#2ECC8A55', borderColor:'#2ECC8A', borderWidth:2, borderRadius:6 }, { label:'Dépenses', data:expData, backgroundColor:'#F7506A55', borderColor:'#F7506A', borderWidth:2, borderRadius:6 } ]}, options:{ ...baseOpts(), plugins:{ legend:{ display:true, labels:{color:'#6B7280',font:{size:11},boxWidth:12,padding:16} }, tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toLocaleString('fr-FR')} ₪`}} }, scales:{ x:{ticks:{color:'#6B7280',font:{size:10}},grid:{color:'#1E2230'}}, y:{ticks:{color:'#6B7280',font:{size:10},callback:v=>v.toLocaleString('fr-FR')},grid:{color:'#1E2230'}} } } });
}
function buildLine(labels, data) {
  if (chartLine) { chartLine.destroy(); chartLine = null; }
  if (!labels.length) return;
  const ctx = document.getElementById('chart-line').getContext('2d');
  const gradient = ctx.createLinearGradient(0,0,0,200);
  gradient.addColorStop(0,'#4F8EF744'); gradient.addColorStop(1,'#4F8EF700');
  chartLine = new Chart(ctx, { type:'line', data:{ labels, datasets:[{ label:'Solde', data, borderColor:'#4F8EF7', borderWidth:2, backgroundColor:gradient, fill:true, tension:0.4, pointRadius:data.length<=20?3:0, pointBackgroundColor:'#4F8EF7' }] }, options:{ ...baseOpts(), plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>` Solde: ${c.parsed.y.toLocaleString('fr-FR')} ₪`}} }, scales:{ x:{ticks:{color:'#6B7280',font:{size:10},maxTicksLimit:6},grid:{color:'#1E2230'}}, y:{ticks:{color:'#6B7280',font:{size:10},callback:v=>v.toLocaleString('fr-FR')},grid:{color:'#1E2230'}} } } });
}
function switchChart(name, btn) {
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.chart-panel').forEach(p=>p.classList.remove('active'));

}

function previewCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    const preview = lines.slice(0, 5);
    const el = document.getElementById('csv-preview');
    el.innerHTML = `
      <div style="font-size:11px;color:var(--green);margin-bottom:8px">✅ ${lines.length} lignes détectées</div>
      <div style="font-size:10px;color:var(--muted);background:var(--divider);border-radius:8px;padding:8px;overflow-x:auto;margin-bottom:12px;font-family:monospace">${preview.map(l=>`<div>${l.substring(0,60)}${l.length>60?'...':''}</div>`).join('')}</div>
      <button onclick="importCSV()" class="submit-btn" style="background:var(--yellow);color:var(--bg)">📥 Importer les transactions</button>`;
    // Store for import
    el.setAttribute('data-csv', e.target.result);
  };
  reader.readAsText(file, 'UTF-8');
}

async function importCSV() {
  const preview = document.getElementById('csv-preview');
  const csv = preview.getAttribute('data-csv');
  const bankName = document.getElementById('bank-name').value;
  if (!csv) return;
  const lines = csv.split('\n').filter(l => l.trim());
  const sep = csv.includes(';') ? ';' : ',';
  let imported = 0;
  const toInsert = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(sep).map(c => c.trim().replace(/"/g,''));
    if (cols.length < 3) continue;
    // Try to parse: date, description, amount
    const dateStr = cols[0];
    const desc = cols[1] || 'Transaction bancaire';
    const amtStr = (cols[2] || cols[3] || '0').replace(/,/,'.');
    const amount = parseFloat(amtStr);
    if (isNaN(amount)) continue;
    toInsert.push({
      user_id: currentUser.id,
      label: desc,
      amount: amount,
      category: 'Divers',
      ...(currentFamily ? { family_id: currentFamily.id } : {})
    });
  }
  if (toInsert.length === 0) { alert('Aucune transaction valide trouvée dans le fichier.'); return; }
  const { error } = await sb.from('transactions').insert(toInsert);
  if (error) { alert('Erreur import: ' + error.message); return; }
  preview.innerHTML = `<div style="text-align:center;padding:16px;color:var(--green)"><div style="font-size:32px;margin-bottom:8px">✅</div><div class="syne" style="font-size:16px;font-weight:700">${toInsert.length} transactions importées !</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Depuis ${bankName}</div></div>`;
  await loadDashboard(); await loadTransactions();
}

  const code = 'FAM-' + Math.random().toString(36).substring(2,8).toUpperCase();
  const myName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
  const { data: fam, error } = await sb.from('families').insert({ name, invite_code: code, created_by: currentUser.id }).select().single();
  if (error) return;
  await sb.from('family_members').insert({ family_id: fam.id, user_id: currentUser.id, display_name: myName, role: 'admin' });
  currentFamily = fam;
  familyMembers = [{ family_id: fam.id, user_id: currentUser.id, display_name: myName, role: 'admin', joined_at: new Date().toISOString() }];
  loadFamilySection();
}
async function joinFamily() {
  const code = document.getElementById('fam-code')?.value.trim().toUpperCase();
  if (!code) return;
  const myName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
  const { data: fam } = await sb.from('families').select('*').eq('invite_code', code).maybeSingle();
  if (!fam) { const el = document.getElementById('fam-msg'); if(el) el.innerHTML='<div style="font-size:12px;color:var(--red);text-align:center">Code invalide.</div>'; return; }
  const { data: existing } = await sb.from('family_members').select('id').eq('family_id', fam.id).eq('user_id', currentUser.id).maybeSingle();
  if (existing) return;
  await sb.from('family_members').insert({ family_id: fam.id, user_id: currentUser.id, display_name: myName, role: 'member' });
  currentFamily = fam;
  const { data: members } = await sb.from('family_members').select('*').eq('family_id', fam.id);
  familyMembers = members || [];
  loadFamilySection();
}
async function leaveFamily(dissolve) {
  if (!confirm(dissolve ? 'Dissoudre la famille ?' : 'Quitter la famille ?')) return;
  if (dissolve) await sb.from('families').delete().eq('id', currentFamily.id);
  else await sb.from('family_members').delete().eq('family_id', currentFamily.id).eq('user_id', currentUser.id);
  currentFamily = null; familyMembers = [];
  loadFamilySection();
}

// ===== HELPERS =====
function getCatIcon(cat) {
  const icons = { Alimentation:'🛒', Logement:'🏠', Transport:'🚗', Loisirs:'🎮', Santé:'💊', Épargne:'💰', Divers:'📦', Salaire:'💼', Freelance:'💻', Allocations:'🏛️', Cadeau:'🎁', Investissement:'📈' };
  return icons[cat] || '💸';
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' });
}
function setType(t) {
  txType = t;
  const catSel = document.getElementById('f-cat');
  if (!catSel) return;
  const exp = ['Alimentation','Logement','Transport','Loisirs','Santé','Épargne','Divers'];
  const inc = ['Salaire','Freelance','Allocations','Loyer reçu','Cadeau','Investissement','Autre'];
  catSel.innerHTML = (t === 'income' ? inc : exp).map(c => `<option>${c}</option>`).join('');
  const labelWrap = document.getElementById('f-label-wrap');
  if (labelWrap) labelWrap.style.display = t === 'income' ? 'none' : 'block';
  if (t === 'income') document.getElementById('f-label').value = '';
}

// ===== VIEW SWITCHING =====
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  document.querySelector('.content').scrollTop = 0;
  if (name === 'stats') loadStats();
  if (name === 'profile') loadProfile();
  if (name === 'projects') loadProjects();
  if (name === 'dashboard') { loadDashboard(); loadTransactions(); }
  if (name === 'add') loadAiTip();
}

// ===== INIT =====
sb.auth.onAuthStateChange((event, session) => {
  if (session?.user) { currentUser = session.user; enterApp(); }
});
</script>
