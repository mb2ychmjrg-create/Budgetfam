<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FinanceAI 🇮🇱</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070c;--card:#11111a;--card2:#191927;--border:#232336;
  --p1:#7c3aed;--p2:#9333ea;--p3:#a855f7;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
  --text:#e2e2f0;--muted:#8888aa;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}
header{padding:16px 18px;background:linear-gradient(135deg,#3b0764,#5b21b6,#7c3aed);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;padding-top:max(16px,env(safe-area-inset-top));box-shadow:0 4px 24px rgba(124,58,237,.3)}
.h-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.h-sub{font-size:10px;opacity:.7;margin-top:2px}
.logout-btn{background:rgba(255,255,255,.12);border:none;border-radius:10px;padding:6px 12px;color:white;font-size:11px;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:14px 14px 88px;-webkit-overflow-scrolling:touch}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;color:var(--muted);cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--p2)}
.nav-btn span:first-child{font-size:20px}
.nav-btn span:last-child{font-size:9px;font-weight:600}

.page{display:none;animation:fadeUp .3s ease both}
.page.active{display:block}

/* AUTH */
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px}
.auth-logo{font-size:52px;margin-bottom:10px}
.auth-title{font-size:26px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.6}
.tabs{display:flex;background:var(--card);border-radius:14px;padding:4px;width:100%;margin-bottom:20px}
.tab{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:var(--muted);transition:all .2s}
.tab.active{background:var(--p1);color:white}
.field{width:100%;padding:13px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;margin-bottom:12px}
.btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(90deg,var(--p1),var(--p2));color:white;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px}
.msg-ok{background:#14532d;color:var(--green);border-radius:10px;padding:10px;font-size:12px;margin-bottom:10px;text-align:center}
.msg-err{background:#450a0a;color:var(--red);border-radius:10px;padding:10px;font-size:12px;margin-bottom:10px;text-align:center}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px}

/* HERO DASHBOARD */
.hero{background:linear-gradient(135deg,#1e0a4e,#2d1264,#1a0533);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.hero-label{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px}
.hero-amount{font-size:32px;font-weight:800;margin:6px 0 2px}
.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;background:rgba(255,255,255,.06);border-radius:12px;padding:10px 8px;text-align:center}
.stat-box label{font-size:9px;color:rgba(255,255,255,.5);display:block;margin-bottom:4px}
.progress-bar{background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;height:5px}
.progress-fill{border-radius:99px;height:5px;background:linear-gradient(90deg,var(--p1),var(--p2));transition:width .8s ease}

/* QUICK BUTTONS */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.quick-btn{padding:10px 4px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:10px;font-weight:600;cursor:pointer;text-align:center}
.q-emoji{font-size:20px;display:block;margin-bottom:3px}

/* TRANSACTIONS */
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.tx-icon{width:36px;height:36px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px}
.tx-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.tx-meta{font-size:10px;color:var(--muted);margin-top:2px}
.tx-amount{font-weight:700;font-size:14px}
.del-btn{background:#3a0a0a;border:none;border-radius:8px;width:28px;height:28px;color:var(--red);cursor:pointer}

/* PDF IMPORT */
.drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px;background:var(--card2);border:2px dashed var(--border);border-radius:16px;cursor:pointer;text-align:center}
.bank-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card2);font-size:11px;cursor:pointer;margin:3px}
.bank-pill.sel-bank{border-color:var(--p2);background:#2d1264;color:#c4b5fd}
.status-loading{display:flex;align-items:center;gap:10px;padding:14px;background:#1e1040;border:1px solid var(--p1);border-radius:12px;font-size:12px;color:#c4b5fd}
.spinner{width:16px;height:16px;border:2px solid rgba(167,139,250,.3);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite}

/* MODAL & PROJ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal-box{background:var(--bg);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:20px}
.pt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pt-btn{padding:12px 6px;border-radius:14px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:11px;cursor:pointer}
.pt-btn.active{background:#1e0a4e;border-color:var(--p2);color:#c4b5fd}
.ai-result{background:linear-gradient(135deg,#1e0a4e,#0f172a);border:1px solid var(--p1);border-radius:14px;padding:14px;font-size:13px;line-height:1.6;margin:10px 0}
</style>
</head>
<body>
<div id="app">
  <header id="app-header" style="display:none">
    <div><div class="h-title">💰 FinanceAI 🇮🇱</div><div class="h-sub" id="h-sub">Chargement...</div></div>
    <button class="logout-btn" onclick="logout()">Déco.</button>
  </header>

  <div class="content" id="main-content" style="display:none">
    <div id="pg-home" class="page active">
      <div id="dashboard-hero"></div>
      <div class="quick-grid">
        <button class="quick-btn" onclick="quickAdd('Courses','🛒','Alimentation')"><span class="q-emoji">🛒</span>Courses</button>
        <button class="quick-btn" onclick="quickAdd('Carburant','⛽','Transport')"><span class="q-emoji">⛽</span>Carburant</button>
        <button class="quick-btn" onclick="quickAdd('Restaurant','🍕','Loisirs')"><span class="q-emoji">🍕</span>Resto</button>
        <button class="quick-btn" onclick="quickAdd('Pharmacie','💊','Santé')"><span class="q-emoji">💊</span>Santé</button>
      </div>
      <div id="tx-list"></div>
    </div>

    <div id="pg-import" class="page">
      <div class="card-title" style="font-size:18px">📄 Importer relevé</div>
      <div class="card">
        <div class="card-title">Ta banque</div>
        <button class="bank-pill" onclick="selectBank(this,'hapoalim')">🔵 Hapoalim</button>
        <button class="bank-pill" onclick="selectBank(this,'leumi')">🟢 Leumi</button>
        <div id="bank-tip" style="font-size:11px;color:var(--muted);margin-top:8px"></div>
      </div>
      <div class="drop-zone" onclick="document.getElementById('file-in').click()">
        <div style="font-size:30px">📂</div>
        <div style="font-weight:700">Appuie pour importer</div>
        <div style="font-size:11px;color:var(--muted)">PDF Hapoalim / Leumi</div>
      </div>
      <input type="file" id="file-in" accept=".pdf" style="display:none" onchange="handleFileImport(this.files[0])">
      <div id="import-status" style="margin-top:12px"></div>
    </div>

    <div id="pg-add" class="page">
        <div class="card">
            <span style="font-size:11px;color:var(--muted)">Description</span>
            <input class="field" id="tx-label" placeholder="Rami Levy...">
            <span style="font-size:11px;color:var(--muted)">Montant (₪)</span>
            <input class="field" id="tx-amount" type="number" placeholder="0.00">
            <button class="btn" onclick="addTx()">Ajouter</button>
        </div>
    </div>

    <div id="pg-projects" class="page">
        <div style="display:flex;justify-content:space-between;margin-bottom:15px">
            <div style="font-size:18px;font-weight:800">Projets 🎯</div>
            <button onclick="openProjModal()" style="background:var(--p1);border:none;border-radius:10px;padding:5px 10px;color:white;font-size:12px">+ Nouveau</button>
        </div>
        <div id="proj-list"></div>
    </div>

    <div id="pg-stats" class="page"><div id="stats-content"></div></div>
  </div>

  <div id="auth-page">
    <div class="auth-wrap">
      <div class="auth-logo">💰</div>
      <div class="auth-title">FinanceAI 🇮🇱</div>
      <div class="tabs">
        <button class="tab active" onclick="setAuthMode('login',this)">Connexion</button>
        <button class="tab" onclick="setAuthMode('signup',this)">Créer compte</button>
      </div>
      <div id="auth-msg"></div>
      <input class="field" id="a-email" type="email" placeholder="Email">
      <input class="field" id="a-pass" type="password" placeholder="Mot de passe">
      <button class="btn" id="auth-btn" onclick="doAuth()">Se connecter</button>
    </div>
  </div>

  <nav class="nav" id="app-nav" style="display:none">
    <button class="nav-btn active" onclick="go('home',this)"><span>🏠</span><span>Accueil</span></button>
    <button class="nav-btn" onclick="go('import',this)"><span>📄</span><span>Importer</span></button>
    <button class="nav-btn" onclick="go('add',this)"><span>➕</span><span>Ajouter</span></button>
    <button class="nav-btn" onclick="go('projects',this)"><span>🎯</span><span>Projets</span></button>
    <button class="nav-btn" onclick="go('stats',this)"><span>📊</span><span>Stats</span></button>
  </nav>
</div>

<div id="quick-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal-box" id="quick-content"></div>
</div>
<div id="proj-modal" class="modal-bg" style="display:none" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal-box" id="proj-modal-content"></div>
</div>

<script>
const sb = supabase.createClient('https://nyywcxcahalxazienuav.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55eXdjeGNhaGFseGF6aWVudWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjMwNzcsImV4cCI6MjA5MTYzOTA3N30._98bpQLnWA6fBiEgbWYPH8RGaWFRj8zIfMGgZe_KopM');
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let user=null;
const RULES=[
  [/rami.?levy|shufersal|שפרסל|victory|ויקטורי/i,'Alimentation'],
  [/super.?pharm|סופר.?פארם|clalit|כללית|maccabi|מכבי/i,'Santé'],
  [/gett|גט|bolt|uber|yango|דלק|sonol|paz/i,'Transport'],
  [/wolt|ten.?bis|restaurant|מסעדה/i,'Loisirs'],
  [/משכנתא|arnona|ארנונה|ועד.?בית|בזק|חשמל|מים/i,'Logement'],
  [/משכורת|salary|שכר/i,'Salaire']
];

function localCat(label,amount){
  for(const[re,cat]of RULES)if(re.test(label))return cat;
  return amount>0?'Salaire':'Divers';
}

// ── AUTH ──
async function doAuth(){
  const email=document.getElementById('a-email').value;
  const pass=document.getElementById('a-pass').value;
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error) alert(error.message); else {user=data.user; enterApp();}
}
function enterApp(){
  document.getElementById('auth-page').style.display='none';
  document.getElementById('app-header').style.display='flex';
  document.getElementById('main-content').style.display='block';
  document.getElementById('app-nav').style.display='flex';
  loadHome(); loadProjects();
}

// ── NAVIGATION ──
function go(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── HOME & DASHBOARD ──
async function loadHome(){
  const {data}=await sb.from('transactions').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  const txs=data||[];
  const inc=txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const bal=inc-exp;
  
  document.getElementById('dashboard-hero').innerHTML=`
    <div class="hero">
      <div class="hero-label">Solde Avril</div>
      <div class="hero-amount">${bal.toLocaleString()} ₪</div>
      <div class="stats-row">
        <div class="stat-box"><label>Revenus</label><b>${inc.toLocaleString()}</b></div>
        <div class="stat-box"><label>Dépenses</label><b>${exp.toLocaleString()}</b></div>
      </div>
    </div>`;
    
  document.getElementById('tx-list').innerHTML=txs.slice(0,10).map(t=>`
    <div class="tx-item">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="tx-icon">${t.amount>0?'💼':'💸'}</div>
        <div><div class="tx-name">${t.label}</div><div class="tx-meta">${t.category}</div></div>
      </div>
      <div class="tx-amount" style="color:${t.amount<0?'var(--red)':'var(--green)'}">${t.amount.toLocaleString()} ₪</div>
    </div>`).join('');
}

// ── PDF MOTEUR CORRECTIF (Hapoalim / Leumi) ──
async function handleFileImport(file){
  const status=document.getElementById('import-status');
  status.innerHTML=`<div class="status-loading"><div class="spinner"></div>Lecture du PDF...</div>`;
  
  try {
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let allText="";
    for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        allText+=content.items.map(it=>it.str).join(' ')+'\n';
    }
    
    // Regex pour DD/MM/YYYY Description Montant Solde
    const regex = /(\d{2}\/\d{2}\/\d{4})\s+(.+?)\s+([\d,]+\.\d{2})\s+(-?[\d,]+\.\d{2})/g;
    let m, transactions=[];
    
    // On capture les lignes. Dans Hapoalim, le signe est déterminé par l'évolution du solde (colonne 4)
    while((m=regex.exec(allText))!==null){
        let label=m[2].trim();
        let amount=parseFloat(m[3].replace(/,/g,''));
        let balance=parseFloat(m[4].replace(/,/g,''));
        transactions.push({date:m[1], label, amount, balance});
    }

    // Correction du signe : Si solde(n) > solde(n+1) -> c'est un crédit (plus récent en haut)
    let finalTxs = [];
    for(let i=0; i<transactions.length-1; i++){
        let current = transactions[i];
        let previous = transactions[i+1]; // La ligne chronologiquement avant (en dessous)
        let diff = current.balance - previous.balance;
        
        let signedAmount = (diff > 0) ? Math.abs(current.amount) : -Math.abs(current.amount);
        
        finalTxs.push({
            user_id: user.id,
            label: current.label,
            amount: signedAmount,
            category: localCat(current.label, signedAmount),
            created_at: new Date().toISOString()
        });
    }

    if(finalTxs.length>0){
        await sb.from('transactions').insert(finalTxs);
        status.innerHTML=`<div style="color:var(--green)">✅ ${finalTxs.length} transactions ajoutées !</div>`;
        loadHome();
    } else {
        status.innerHTML=`<div style="color:var(--red)">❌ Aucune donnée trouvée.</div>`;
    }
  } catch(e) { status.innerHTML=`<div style="color:var(--red)">Erreur: ${e.message}</div>`; }
}

// ── QUICK ACTIONS & PROJETS ──
async function quickAdd(label,emoji,cat){
    const amt=prompt(`Montant pour ${label} ?`);
    if(amt){
        await sb.from('transactions').insert({user_id:user.id, label, amount:-Math.abs(amt), category:cat});
        loadHome();
    }
}

async function addTx(){
    const label=document.getElementById('tx-label').value;
    const amt=document.getElementById('tx-amount').value;
    if(label && amt){
        await sb.from('transactions').insert({user_id:user.id, label, amount:-Math.abs(amt), category:localCat(label,-amt)});
        loadHome(); go('home', document.querySelectorAll('.nav-btn')[0]);
    }
}

function openProjModal(){
    document.getElementById('proj-modal').style.display='flex';
    document.getElementById('proj-modal-content').innerHTML=`
        <div style="text-align:center">
            <h3>Nouveau Projet 🎯</h3>
            <input class="field" id="p-name" placeholder="Nom (ex: Mariage)">
            <input class="field" id="p-target" type="number" placeholder="Objectif ₪">
            <button class="btn" onclick="saveProj()">Créer le plan IA</button>
        </div>`;
}

async function saveProj(){
    const name=document.getElementById('p-name').value;
    const target=document.getElementById('p-target').value;
    await sb.from('projects').insert({user_id:user.id, name, target_amount:target, saved_amount:0, type:'autre'});
    document.getElementById('proj-modal').style.display='none';
    loadProjects();
}

async function loadProjects(){
    const {data}=await sb.from('projects').select('*').eq('user_id',user.id);
    document.getElementById('proj-list').innerHTML=(data||[]).map(p=>`
        <div class="card">
            <div style="display:flex;justify-content:space-between"><b>${p.name}</b> <span>${p.target_amount} ₪</span></div>
            <div class="progress-bar" style="margin-top:10px"><div class="progress-fill" style="width:${(p.saved_amount/p.target_amount)*100}%"></div></div>
        </div>`).join('');
}

function logout(){ sb.auth.signOut(); location.reload(); }
</script>
</body>
