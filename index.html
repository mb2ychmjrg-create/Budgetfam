.tx-meta{

<script>
/* =========================
   CONFIG SUPABASE
========================= */
const SUPABASE_URL = "https://nyywcxcahalxazienuav.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sJ38oz";

/* =========================
   INIT SUPABASE
========================= */
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   LOGIN / SESSION
========================= */
async function login(email, password) {
  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Erreur login: " + error.message);
    return;
  }

  localStorage.setItem("user", JSON.stringify(data.user));
  loadData();
}

async function logout() {
  await client.auth.signOut();
  localStorage.removeItem("user");
  location.reload();
}

/* =========================
   LOAD DATA (BANK + BUDGET)
========================= */
async function loadData() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return;

  const { data, error } = await client
    .from("transactions")
    .select("*")
    .eq("user_id", user.id)
    .order("date", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  renderTransactions(data);
  calculateTotals(data);
}

/* =========================
   RENDER TRANSACTIONS
========================= */
function renderTransactions(data) {
  const container = document.getElementById("transactions");
  if (!container) return;

  container.innerHTML = "";

  data.forEach(t => {
    const div = document.createElement("div");
    div.className = "transaction";
    div.innerHTML = `
      <div>${t.title}</div>
      <div>${t.amount} ₪</div>
      <div>${t.date}</div>
    `;
    container.appendChild(div);
  });
}

/* =========================
   TOTALS
========================= */
function calculateTotals(data) {
  let income = 0;
  let expense = 0;

  data.forEach(t => {
    if (t.amount > 0) income += t.amount;
    else expense += t.amount;
  });

  const balance = income + expense;

  const elIncome = document.getElementById("income");
  const elExpense = document.getElementById("expense");
  const elBalance = document.getElementById("balance");

  if (elIncome) elIncome.innerText = income;
  if (elExpense) elExpense.innerText = expense;
  if (elBalance) elBalance.innerText = balance;
}

/* =========================
   ADD TRANSACTION
========================= */
async function addTransaction(title, amount, date) {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return;

  const { error } = await client.from("transactions").insert([
    {
      user_id: user.id,
      title,
      amount: parseFloat(amount),
      date
    }
  ]);

  if (error) {
    alert("Erreur ajout transaction");
    return;
  }

  loadData();
}

/* =========================
   UPLOAD PDF BANK STATEMENT
========================= */
async function uploadPDF(file) {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return;

  const filePath = `${user.id}/${Date.now()}-${file.name}`;

  const { error } = await client.storage
    .from("bank-pdfs")
    .upload(filePath, file);

  if (error) {
    alert("Erreur upload PDF");
    return;
  }

  alert("PDF envoyé ✔");
}

/* =========================
   AUTO INIT
========================= */
window.addEventListener("load", () => {
  loadData();
});
</script>
