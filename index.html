<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0D0F14;--card:#161A23;--border:#232840;
    --accent:#4F8EF7;--accent-soft:#1E2D50;
    --green:#2ECC8A;--green-soft:#0E3028;
    --red:#F7506A;--red-soft:#3A1020;
    --yellow:#F7C948;--yellow-soft:#3A2E0A;
    --purple:#A78BFA;--purple-soft:#1E1640;
    --text:#E8EAF2;--muted:#6B7280;--divider:#1E2230;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
  .syne{font-family:'Syne',sans-serif;}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes barGrow{from{width:0}}
  .fu{animation:fadeUp .4s ease both;}
  .fu1{animation-delay:.04s}.fu2{animation-delay:.1s}.fu3{animation-delay:.17s}.fu4{animation-delay:.24s}.fu5{animation-delay:.31s}
  #app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;}
  .auth-screen{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:30px 24px;background:var(--bg);}
  .auth-logo{font-size:48px;margin-bottom:8px;}
  .auth-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:4px;font-family:'Syne',sans-serif;}
  .auth-sub{font-size:13px;color:var(--muted);margin-bottom:36px;text-align:center;line-height:1.5;}
  .auth-tabs{display:flex;background:var(--card);border-radius:14px;padding:4px;margin-bottom:24px;width:100%;}
  .auth-tab{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:13px;background:transparent;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif;}
  .auth-tab.active{background:var(--accent);color:#fff;}
  .field-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;width:100%;}
  .field{width:100%;padding:13px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:14px;}
  .field:focus{border-color:var(--accent);}
  .btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .3s;margin-top:4px;}
  .btn-primary:active{opacity:.8;}
  .btn-primary.loading{opacity:.6;pointer-events:none;}
  .auth-error{background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;width:100%;text-align:center;}
  .auth-success{background:var(--green-soft);color:var(--green);border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:12px;width:100%;text-align:center;}
  .header{padding:14px 18px 12px;border-bottom:1px solid var(--divider);display:flex;justify-content:space-between;align-items:center;background:var(--bg);flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top));}
  .header-title{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
  .header-sub{font-size:11px;color:var(--muted);margin-top:1px;}
  .logout-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .content{flex:1;overflow-y:auto;padding:14px 14px 80px;-webkit-overflow-scrolling:touch;}
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100;}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 14px;border-radius:12px;transition:color .2s;color:var(--muted);}
  .nav-item.active{color:var(--accent);}
  .nav-item span:first-child{font-size:20px;}
  .nav-item span:last-child{font-size:10px;font-weight:600;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:14px;}
  .hero{background:linear-gradient(135deg,#1A2540,#0D1428);border:1px solid var(--accent-soft);border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:var(--accent);border-radius:50%;opacity:.07;}
  .bar-wrap{background:var(--divider);border-radius:99px;overflow:hidden;}
  .bar{border-radius:99px;animation:barGrow .8s cubic-bezier(.4,0,.2,1) both;transition:width .6s;}
  .tag{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;display:inline-block;}
  .tx{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--divider);}
  .tx-icon{width:36px;height:36px;border-radius:10px;background:var(--divider);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .select-field{width:100%;padding:12px 14px;border-radius:12px;background:var(--divider);border:1px solid var(--border);color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;margin-bottom:14px;}
  .submit-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Syne',sans-serif;transition:background .3s;}
  .view{display:none;}.view.active{display:block;}
  .sec-title{font-size:14px;font-weight:700;margin-bottom:14px;}
  .stat-mini{flex:1;background:var(--divider);border-radius:10px;padding:9px 7px;text-align:center;}
  .stat-mini label{font-size:10px;color:var(--muted);display:block;margin-bottom:2px;}
  .stat-mini b{font-size:13px;font-weight:700;}
  .spinner{display:block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;}
  .empty span{font-size:32px;display:block;margin-bottom:10px;}
  /* Chart tabs */
  .chart-tabs{display:flex;gap:6px;margin-bottom:16px;}
  .chart-tab{flex:1;padding:8px 4px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-align:center;}
  .chart-tab.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .chart-panel{display:none;}
  .chart-panel.active{display:block;}
  .legend-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--divider);font-size:12px;}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
</style>
</head>

let currentUser = null;
let txType = 'expense';
let currentFamily = null;
let familyMembers = [];
let chartDonut = null, chartBar = null, chartLine = null;
const PALETTE = ['#4F8EF7','#2ECC8A','#F7506A','#F7C948','#A78BFA','#FB923C','#34D399','#F472B6'];

// ===== AUTH =====
let authMode = 'login';
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&mode==='login')||(i===1&&mode==='signup')));
  document.getElementById('signup-extra').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Se connecter' : 'Créer mon compte';
  document.getElementById('auth-msg').innerHTML = '';
}
function showMsg(msg, type='error') {
  document.getElementById('auth-msg').innerHTML = `<div class="auth-${type}">${msg}</div>`;
}
async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-btn');
  if (!email || !password) return showMsg('Remplis tous les champs.');
  btn.classList.add('loading'); btn.textContent = '...';
  if (authMode === 'signup') {
    const name = document.getElementById('auth-name').value.trim() || 'Utilisateur';
    const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) { showMsg(error.message); btn.classList.remove('loading'); btn.textContent = 'Créer mon compte'; return; }
    showMsg('✅ Compte créé ! Vérifie ton email.', 'success');
    btn.classList.remove('loading'); btn.textContent = 'Créer mon compte';
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showMsg('Email ou mot de passe incorrect.'); btn.classList.remove('loading'); btn.textContent = 'Se connecter'; return; }
    currentUser = data.user;
    enterApp();
  }
}
async function handleLogout() {
  await sb.auth.signOut();
  currentUser = null;
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
}

// ===== APP ENTRY =====
async function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
  const name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
  document.getElementById('header-sub').textContent = `Bonjour, ${name} 👋`;
  await loadDashboard();
  await loadTransactions();
  await loadFamilyData();
  loadAiTip();
}

// ===== DASHBOARD =====
async function loadDashboard() {
  const el = document.getElementById('dashboard-content');
  const { data: txs, error } = await sb.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if (error) { el.innerHTML = '<div class="empty"><span>⚠️</span>Erreur de chargement</div>'; return; }
  const all = txs || [];
  const income   = all.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
  const expenses = all.filter(t => t.amount < 0).reduce((s,t) => s + Math.abs(t.amount), 0);
  const balance  = income - expenses;
  const pct = income > 0 ? Math.min(100, Math.round((balance / income) * 100)) : 0;
  if (all.length === 0) {
    el.innerHTML = `<div class="hero fu fu1"><div style="font-size:11px;color:var(--muted)">Dashboard</div><div class="syne" style="font-size:20px;font-weight:600">Aucune donnée</div><p style="margin-top:10px;color:var(--muted);font-size:13px">Ajoute ta première transaction !</p></div>`;
    return;
  }
  el.innerHTML = `
    <div class="hero fu fu1">
      <div style="font-size:11px;color:var(--muted)">Résumé du mois</div>
      <div class="syne" style="font-size:26px;font-weight:800;margin:4px 0">${balance.toLocaleString('fr-FR')} ₪</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Solde disponible</div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div class="stat-mini"><label>Revenus</label><b style="color:var(--green)">${income.toLocaleString('fr-FR')} ₪</b></div>
        <div class="stat-mini"><label>Dépenses</label><b style="color:var(--red)">${expenses.toLocaleString('fr-FR')} ₪</b></div>
        <div class="stat-mini"><label>Épargne %</label><b style="color:var(--accent)">${pct}%</b></div>
      </div>
      <div class="bar-wrap" style="height:6px"><div class="bar" style="width:${pct}%;height:6px;background:var(--accent)"></div></div>
    </div>`;
}

// ===== TRANSACTIONS LIST =====
async function loadTransactions() {
  const list = document.getElementById('tx-list');
  list.innerHTML = '<div class="spinner"></div>';
  const { data, error } = await sb.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }).limit(20);
  if (error) { list.innerHTML = '<div class="empty"><span>⚠️</span>Erreur</div>'; return; }
  if (!data || data.length === 0) { list.innerHTML = `<div class="empty"><span>💸</span>Aucune transaction encore.</div>`; return; }
  list.innerHTML = `
    <div class="card" style="padding:14px 16px">
      <div class="syne sec-title">Transactions récentes</div>
      ${data.map(t => {
        const member = familyMembers.find(m => m.user_id === t.user_id);
        const memberName = member ? member.display_name : null;
        return `
        <div class="tx" id="tx-${t.id}">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="tx-icon">${getCatIcon(t.category)}</div>
            <div>
              <div style="font-weight:600;font-size:13px">${t.label || t.description || '—'}</div>
              <div style="font-size:10px;color:var(--muted)">${t.category || ''} · ${formatDate(t.created_at)}${memberName ? ` · <span style="color:var(--purple)">${memberName}</span>` : ''}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-weight:700;font-size:14px;color:${t.amount < 0 ? 'var(--red)' : 'var(--green)'}">
              ${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString('fr-FR')} ₪
            </div>
            <button onclick="deleteTx('${t.id}')" style="background:var(--red-soft);border:none;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;">🗑️</button>
          </div>
        </div>`}).join('')}
    </div>`;
}

// ===== STATS VIEW =====
async function loadStats() {
  const el = document.getElementById('stats-content');

  const { data: txs } = await sb.from('transactions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true });

    catMap[cat] = (catMap[cat] || 0) + Math.abs(t.amount);

  const incomeData  = months.map(m => mIncome[m]   || 0);
  const expData     = months.map(m => mExpenses[m] || 0);

  // Courbe solde cumulé
  let running = 0;
  const balanceData   = all.map(t => { running += t.amount; return Math.round(running); });
  const balanceLabels = all.map(t => formatDate(t.created_at));

  // Résumé
  const income   = all.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
  const expenses = all.filter(t => t.amount < 0).reduce((s,t) => s + Math.abs(t.amount), 0);
  const savings  = income - expenses;

  el.innerHTML = `
    <div class="card fu fu1">
      <div class="syne sec-title">Résumé global</div>
      <div style="display:flex;gap:8px">
        <div class="stat-mini"><label>Revenus</label><b style="color:var(--green)">${income.toLocaleString('fr-FR')} ₪</b></div>
        <div class="stat-mini"><label>Dépenses</label><b style="color:var(--red)">${expenses.toLocaleString('fr-FR')} ₪</b></div>
        <div class="stat-mini"><label>Épargne</label><b style="color:${savings>=0?'var(--accent)':'var(--red)'}">${savings.toLocaleString('fr-FR')} ₪</b></div>
      </div>
    </div>

    <div class="card fu fu2">

        <button class="chart-tab"        onclick="switchChart('line',this)">📈 Solde</button>
      </div>

      <div id="panel-donut" class="chart-panel active">
        <div style="position:relative;height:200px;display:flex;align-items:center;justify-content:center;">
          <canvas id="chart-donut"></canvas>
        </div>
        <div id="donut-legend" style="margin-top:12px"></div>
      </div>

      <div id="panel-bar" class="chart-panel">
        <div style="position:relative;height:220px;">
          <canvas id="chart-bar"></canvas>
        </div>
      </div>

      <div id="panel-line" class="chart-panel">
        <div style="position:relative;height:220px;">
          <canvas id="chart-line"></canvas>
        </div>
      </div>

    <div class="card fu fu3">
      <div class="syne sec-title">Nombre de transactions</div>

    </div>`;

    buildDonut(catLabels, catValues);
    buildBar(monthLabels, incomeData, expData);
    buildLine(balanceLabels, balanceData);
  });
}

// ===== CHARTS =====
function baseOpts() {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } }
  };
}

function buildDonut(labels, values) {
  if (chartDonut) { chartDonut.destroy(); chartDonut = null; }
  if (!labels.length) return;
  const ctx = document.getElementById('chart-donut').getContext('2d');
  chartDonut = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: PALETTE, borderColor: '#161A23', borderWidth: 3, hoverOffset: 6 }] },
    options: {
      ...baseOpts(), cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.label}: ${c.parsed.toLocaleString('fr-FR')} ₪` } } }
    }
  });
  const total = values.reduce((a,b) => a+b, 0);
  document.getElementById('donut-legend').innerHTML = labels.map((l,i) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${PALETTE[i%PALETTE.length]}"></div>
      <div style="flex:1;font-size:12px">${getCatIcon(l)} ${l}</div>
      <div style="font-size:12px;color:var(--muted)">${values[i].toLocaleString('fr-FR')} ₪</div>
      <div style="font-size:11px;color:var(--accent);margin-left:6px;width:32px;text-align:right">${Math.round(values[i]/total*100)}%</div>
    </div>`).join('');
}

function buildBar(labels, incomeData, expData) {
  if (chartBar) { chartBar.destroy(); chartBar = null; }
  if (!labels.length) return;
  const ctx = document.getElementById('chart-bar').getContext('2d');
  chartBar = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [
      { label: 'Revenus',  data: incomeData, backgroundColor: '#2ECC8A55', borderColor: '#2ECC8A', borderWidth: 2, borderRadius: 6 },
      { label: 'Dépenses', data: expData,    backgroundColor: '#F7506A55', borderColor: '#F7506A', borderWidth: 2, borderRadius: 6 }
    ]},
    options: {
      ...baseOpts(),
      plugins: { legend: { display: true, labels: { color: '#6B7280', font: { size: 11 }, boxWidth: 12, padding: 16 } }, tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${c.parsed.y.toLocaleString('fr-FR')} ₪` } } },
      scales: {
        x: { ticks: { color: '#6B7280', font: { size: 10 } }, grid: { color: '#1E2230' } },
        y: { ticks: { color: '#6B7280', font: { size: 10 }, callback: v => v.toLocaleString('fr-FR') }, grid: { color: '#1E2230' } }
      }
    }
  });
}

function buildLine(labels, data) {
  if (chartLine) { chartLine.destroy(); chartLine = null; }
  if (!labels.length) return;
  const ctx = document.getElementById('chart-line').getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 200);
  gradient.addColorStop(0, '#4F8EF744');
  gradient.addColorStop(1, '#4F8EF700');
  chartLine = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ label: 'Solde', data, borderColor: '#4F8EF7', borderWidth: 2, backgroundColor: gradient, fill: true, tension: 0.4, pointRadius: data.length <= 20 ? 3 : 0, pointBackgroundColor: '#4F8EF7' }] },
    options: {
      ...baseOpts(),
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` Solde: ${c.parsed.y.toLocaleString('fr-FR')} ₪` } } },
      scales: {
        x: { ticks: { color: '#6B7280', font: { size: 10 }, maxTicksLimit: 6 }, grid: { color: '#1E2230' } },
        y: { ticks: { color: '#6B7280', font: { size: 10 }, callback: v => v.toLocaleString('fr-FR') }, grid: { color: '#1E2230' } }
      }
    }
  });
}

function switchChart(name, btn) {
  document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

// ===== ADD TRANSACTION =====
async function submitTx() {
  const label    = txType === 'income' ? document.getElementById('f-cat').value : document.getElementById('f-label').value.trim();
  const amount   = parseFloat(document.getElementById('f-amount').value);
  const category = document.getElementById('f-cat').value;
  if (!amount) return;
  const btn = document.getElementById('submit-btn');
  btn.textContent = '...'; btn.style.background = 'var(--muted)';
  const { error } = await sb.from('transactions').insert({
    user_id: currentUser.id, label,
    amount: txType === 'expense' ? -Math.abs(amount) : Math.abs(amount),
    category,
    ...(currentFamily ? { family_id: currentFamily.id } : {})
  });
  if (error) {
    btn.textContent = 'Erreur — réessayez'; btn.style.background = 'var(--red)';
    setTimeout(() => { btn.textContent = 'Ajouter la transaction'; btn.style.background = 'var(--accent)'; }, 2000);
    return;
  }
  btn.textContent = '✅ Ajouté !'; btn.style.background = 'var(--green)';
  document.getElementById('f-label').value = '';
  document.getElementById('f-amount').value = '';
  setTimeout(() => { btn.textContent = 'Ajouter la transaction'; btn.style.background = 'var(--accent)'; }, 1500);
  await loadDashboard();
  await loadTransactions();
}

// ===== AI TIP =====
function loadAiTip() {
  const el = document.getElementById('ai-tip');
  if (!el) return;
  const tips = [
    "💡 Essaie d'épargner 20% de tes revenus chaque mois.",
    "🛒 Les courses chez Rami Levy ou Victory réduisent la facture alimentaire.",
    "📱 Vérifie tes abonnements — tu en as peut-être d'inutiles.",
    "🏠 Le logement ne devrait pas dépasser 30% de tes revenus.",
    "💰 Un fonds d'urgence de 3 mois de dépenses est recommandé.",
  ];
  el.textContent = tips[Math.floor(Math.random() * tips.length)];
}

// ===== DELETE TRANSACTION =====
async function deleteTx(id) {
  if (!confirm('Supprimer cette transaction ?')) return;

  const row = document.getElementById('tx-' + id);
  if (row) { row.style.opacity = '0.4'; row.style.pointerEvents = 'none'; }

  const { error } = await sb.from('transactions').delete().eq('id', id).eq('user_id', currentUser.id);

  if (error) {
    if (row) { row.style.opacity = '1'; row.style.pointerEvents = 'auto'; }
    alert('Erreur lors de la suppression.');
    return;
  }

  // Retirer la ligne avec animation
  if (row) {
    row.style.transition = 'all .3s';
    row.style.maxHeight  = row.offsetHeight + 'px';
    requestAnimationFrame(() => {
      row.style.maxHeight  = '0';
      row.style.opacity    = '0';
      row.style.padding    = '0';
      row.style.overflow   = 'hidden';
    });
    setTimeout(() => row.remove(), 350);
  }

  await loadDashboard();
}

// ===== FAMILY =====
async function loadFamilyData() {
  // Cherche si l'utilisateur appartient à une famille
  const { data } = await sb
    .from('family_members')
    .select('*, families(*)')
    .eq('user_id', currentUser.id)
    .maybeSingle();

  if (data?.families) {
    currentFamily = data.families;
    // Charger tous les membres
    const { data: members } = await sb
      .from('family_members')
      .select('*')
      .eq('family_id', currentFamily.id);
    familyMembers = members || [];
  }
}

async function loadFamilySection() {
  const el = document.getElementById('family-section');
  if (!el) return;

  if (!currentFamily) {
    el.innerHTML = `
      <div class="card fu fu3" style="border-color:var(--purple);background:var(--purple-soft)">
        <div class="syne sec-title" style="color:var(--purple)">👨‍👩‍👧 Ma Famille</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">Crée une famille pour partager les dépenses et revenus avec tes proches.</p>

        <label class="field-label">Nom de la famille</label>
        <input class="field" id="fam-name" placeholder="Ex: Famille Cohen" type="text" style="background:var(--bg)">
        <button onclick="createFamily()" style="width:100%;padding:12px;border-radius:12px;border:none;background:var(--purple);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:'Syne',sans-serif;margin-bottom:14px;">
          ✨ Créer ma famille
        </button>

        <div style="text-align:center;font-size:11px;color:var(--muted);margin-bottom:12px">— ou rejoindre une famille existante —</div>

        <label class="field-label">Code d'invitation</label>
        <input class="field" id="fam-code" placeholder="Ex: FAM-ABC123" type="text" style="background:var(--bg);text-transform:uppercase;letter-spacing:2px">
        <button onclick="joinFamily()" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--purple);background:transparent;color:var(--purple);font-weight:700;font-size:14px;cursor:pointer;font-family:'Syne',sans-serif;">
          🔗 Rejoindre
        </button>
        <div id="fam-msg" style="margin-top:10px"></div>
      </div>`;
    return;
  }

  // Famille existante
  const myRole = familyMembers.find(m => m.user_id === currentUser.id)?.role;

  el.innerHTML = `
    <div class="card fu fu3" style="border-color:var(--purple);background:var(--purple-soft)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="syne sec-title" style="color:var(--purple);margin-bottom:0">👨‍👩‍👧 ${currentFamily.name}</div>
        <div style="font-size:10px;background:var(--purple);color:#fff;border-radius:20px;padding:2px 8px;font-weight:700">${myRole === 'admin' ? '👑 Admin' : '👤 Membre'}</div>
      </div>

      <!-- Code d'invitation -->
      <div style="background:var(--bg);border-radius:12px;padding:12px;margin-bottom:14px;text-align:center">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px">Code d'invitation</div>
        <div style="font-size:18px;font-weight:800;letter-spacing:3px;color:var(--purple);font-family:'Syne',sans-serif">${currentFamily.invite_code}</div>
        <button onclick="copyCode('${currentFamily.invite_code}')" style="margin-top:8px;background:var(--purple-soft);border:1px solid var(--purple);color:var(--purple);border-radius:8px;padding:5px 14px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600">
          📋 Copier
        </button>
      </div>

      <!-- Membres -->
      <div class="syne" style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text)">Membres (${familyMembers.length})</div>
      ${familyMembers.map(m => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--divider)">
          <div style="width:32px;height:32px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:14px">
            ${m.user_id === currentFamily.created_by ? '👑' : '👤'}
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${m.display_name || 'Membre'}</div>
            <div style="font-size:10px;color:var(--muted)">Rejoint le ${new Date(m.joined_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</div>
          </div>
          ${m.user_id === currentUser.id ? '<div style="font-size:10px;color:var(--accent);font-weight:600">Moi</div>' : ''}
        </div>`).join('')}

      ${myRole === 'admin' ? `
        <button onclick="leaveFamily(true)" style="width:100%;margin-top:14px;padding:10px;border-radius:10px;border:1px solid var(--red-soft);background:transparent;color:var(--red);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">
          🗑️ Dissoudre la famille
        </button>` : `
        <button onclick="leaveFamily(false)" style="width:100%;margin-top:14px;padding:10px;border-radius:10px;border:1px solid var(--red-soft);background:transparent;color:var(--red);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">
          🚪 Quitter la famille
        </button>`}
    </div>`;
}

async function createFamily() {
  const name = document.getElementById('fam-name')?.value.trim();
  if (!name) return;
  const code = 'FAM-' + Math.random().toString(36).substring(2,8).toUpperCase();
  const myName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];

  const { data: fam, error } = await sb.from('families').insert({
    name, invite_code: code, created_by: currentUser.id
  }).select().single();

  if (error) { showFamMsg('Erreur lors de la création.', 'error'); return; }

  await sb.from('family_members').insert({
    family_id: fam.id, user_id: currentUser.id,
    display_name: myName, role: 'admin'
  });

  currentFamily = fam;
  familyMembers = [{ family_id: fam.id, user_id: currentUser.id, display_name: myName, role: 'admin', joined_at: new Date().toISOString() }];
  loadFamilySection();
}

async function joinFamily() {
  const code = document.getElementById('fam-code')?.value.trim().toUpperCase();
  if (!code) return;
  const myName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];

  const { data: fam, error } = await sb.from('families').select('*').eq('invite_code', code).maybeSingle();
  if (error || !fam) { showFamMsg('Code invalide ou introuvable.', 'error'); return; }

  // Vérifier si déjà membre
  const { data: existing } = await sb.from('family_members').select('id').eq('family_id', fam.id).eq('user_id', currentUser.id).maybeSingle();
  if (existing) { showFamMsg('Tu es déjà dans cette famille.', 'error'); return; }

  const { error: e2 } = await sb.from('family_members').insert({
    family_id: fam.id, user_id: currentUser.id,
    display_name: myName, role: 'member'
  });
  if (e2) { showFamMsg('Erreur lors de la jonction.', 'error'); return; }

  currentFamily = fam;
  const { data: members } = await sb.from('family_members').select('*').eq('family_id', fam.id);
  familyMembers = members || [];
  loadFamilySection();
}

async function leaveFamily(dissolve) {
  const msg = dissolve ? 'Dissoudre la famille ? Tous les membres seront retirés.' : 'Quitter la famille ?';
  if (!confirm(msg)) return;

  if (dissolve) {
    await sb.from('families').delete().eq('id', currentFamily.id);
  } else {
    await sb.from('family_members').delete().eq('family_id', currentFamily.id).eq('user_id', currentUser.id);
  }
  currentFamily = null;
  familyMembers = [];
  loadFamilySection();
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => alert('Code copié : ' + code));
}

function showFamMsg(msg, type) {
  const el = document.getElementById('fam-msg');
  if (el) el.innerHTML = `<div style="font-size:12px;color:var(--${type==='error'?'red':'green'});text-align:center;padding:6px">${msg}</div>`;
}

// ===== HELPERS =====
function getCatIcon(cat) {
  const icons = { Alimentation:'🛒', Logement:'🏠', Transport:'🚗', Loisirs:'🎮', Santé:'💊', Épargne:'💰', Divers:'📦', Revenus:'💼', Salaire:'💼', Freelance:'💻', Allocations:'🏛️', Cadeau:'🎁', Investissement:'📈' };
  return icons[cat] || '💸';
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit' });
}
function setType(t) {
  txType = t;
  const catSel = document.getElementById('f-cat');
  if (!catSel) return;
  const exp = ['Alimentation','Logement','Transport','Loisirs','Santé','Épargne','Divers'];
  const inc = ['Salaire','Freelance','Allocations','Loyer reçu','Cadeau','Investissement','Autre'];
  catSel.innerHTML = (t === 'income' ? inc : exp).map(c => `<option>${c}</option>`).join('');
  // Masquer le champ description pour les revenus
  const labelWrap = document.getElementById('f-label-wrap');
  if (labelWrap) labelWrap.style.display = t === 'income' ? 'none' : 'block';
  if (t === 'income') document.getElementById('f-label').value = '';
}

// ===== VIEW SWITCHING =====
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  document.querySelector('.content').scrollTop = 0;
  if (name === 'stats')     loadStats();
  if (name === 'profile')   loadProfile();
  if (name === 'dashboard') { loadDashboard(); loadTransactions(); }
}

// ===== INIT =====
sb.auth.onAuthStateChange((event, session) => {
  if (session?.user) { currentUser = session.user; enterApp(); }
});
</script>
