<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>פיננסAI 🇮🇱</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    /* Styles corrigés */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg: #07070c;
      --card: #11111a;
      --card2: #191927;
      --border: #232336;
      --p1: #7c3aed;
      --p2: #9333ea;
      --p3: #a855f7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --text: #e2e2f0;
      --muted: #8888aa;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      direction: rtl;
    }
    header {
      padding: 16px 18px;
      background: linear-gradient(135deg, #3b0764, #5b21b6, #7c3aed);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 88px;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Page d'authentification -->
    <div id="auth-page">
      <input class="field" id="a-email" type="email" placeholder="your@email.com">
      <input class="field" id="a-pass" type="password" placeholder="password">
      <button id="auth-btn" onclick="doAuth()">התחבר</button>
    </div>

    <!-- Page principale -->
    <div id="main-content" style="display: none">
      <header>
        <div class="h-title">פיננסAI</div>
        <button onclick="logout()">יציאה</button>
      </header>
      <div id="dashboard"></div>
    </div>
  </div>

  <script>
    const sb = supabase.createClient(
      'https://nyywcxcahalxazienuav.supabase.co',
      'votre_clé_supabase_ici'
    );

    /**
     * Fonction pour gérer l'importation de fichiers PDF.
     */
    async function importPDF(file, statusEl) {
      if (typeof pdfjsLib === 'undefined') {
        setStatus(statusEl, "error", "PDF.js n'est pas chargé. Veuillez actualiser la page.");
        return;
      }

      setStatus(statusEl, "loading", "📄 Ouverture du fichier PDF...");
      try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        const numPages = Math.min(pdf.numPages, 10);

        setStatus(statusEl, "loading", `🖼️ Conversion des ${numPages} pages en texte...`);
        let extractedText = "";

        for (let p = 1; p <= numPages; p++) {
          const page = await pdf.getPage(p);
          const content = await page.getTextContent();
          const pageText = content.items.map(item => item.str).join(" ");
          extractedText += pageText + "\n";
          setStatus(statusEl, "loading", `🖼️ Page ${p}/${numPages} traitée...`);
        }

        setStatus(statusEl, "loading", "🤖 Classification des transactions...");
        const transactions = parseTransactionsFromText(extractedText);

        if (!transactions.length) {
          setStatus(statusEl, "error", "🤔 Aucune transaction n'a été détectée dans le fichier PDF.");
          return;
        }

        setStatus(statusEl, "loading", `✅ ${transactions.length} transactions détectées. Enregistrement en cours...`);
        await saveImportedTx(transactions, file.name, statusEl);
      } catch (err) {
        console.error(err);
        setStatus(statusEl, "error", "❌ Une erreur s'est produite : " + err.message);
      }
    }

    function parseTransactionsFromText(text) {
      const transactions = [];
      const lines = text.split("\n");
      const transactionRegex = /(\d{4}-\d{2}-\d{2})\s+(.+?)\s+([-\d,.]+)/;

      for (const line of lines) {
        const match = transactionRegex.exec(line);
        if (match) {
          const [, date, label, rawAmount] = match;
          const amount = parseFloat(rawAmount.replace(",", "").replace("₪", ""));
          transactions.push({ date, label, amount });
        }
      }
      return transactions;
    }

    async function saveImportedTx(transactions, fileName, statusEl) {
      if (!transactions.length) {
        setStatus(statusEl, "error", "Aucune transaction valide trouvée.");
        return;
      }
      setStatus(statusEl, "loading", `💾 Enregistrement de ${transactions.length} transactions...`);

      const { error } = await sb.from('transactions').insert(transactions);
      if (error) {
        setStatus(statusEl, "error", `Erreur : ${error.message}`);
        return;
      }

      setStatus(statusEl, "success", `✅ ${transactions.length} transactions enregistrées avec succès!`);
    }

    function setStatus(el, type, message) {
      el.innerHTML = `<div class="status-${type}">${message}</div>`;
    }
  </script>
</body>
</html>
